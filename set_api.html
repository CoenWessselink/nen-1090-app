<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NEN1090 – API instellen</title>
  <link rel="stylesheet" href="css/theme.css" />
<link rel="manifest" href="/manifest.webmanifest" />
<meta name="theme-color" content="#0c1830" />
<link rel="apple-touch-icon" href="/icons/icon-192.png" />
</head>
<body>
  <div style="max-width:760px;margin:60px auto;font-family:system-ui,Segoe UI,Arial">
    <h2>API instellen…</h2>
    <p>Een moment. We zetten de API URL in localStorage en sturen je door naar de applicatie.</p>
    <p id="msg" style="opacity:.8"></p>
  </div>
  <script>
    (function(){
      const params = new URLSearchParams(location.search);
      const api = params.get('api') || '/api';
      try {
        localStorage.setItem('nen1090.api.baseUrl', api);
        document.getElementById('msg').textContent = 'API URL gezet op: ' + api;
      } catch (e) {
        document.getElementById('msg').textContent = 'Kon localStorage niet schrijven: ' + (e && e.message ? e.message : e);
      }
      setTimeout(() => location.replace('index.html'), 400);
    })();
  </script>
<script src="js/core/pwa.js"></script>
</body>
</html>
