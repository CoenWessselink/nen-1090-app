<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="../css/theme.css" />
  <link rel="stylesheet" href="../css/workflow-rebuild.css" />

<link rel="manifest" href="/manifest.webmanifest" />
<meta name="theme-color" content="#0c1830" />
<link rel="apple-touch-icon" href="/icons/icon-192.png" />

  <link rel="stylesheet" href="../css/login-marketing.css" />

<body data-title="Instellingen">
  <main class="mobile-page-main">
    <section class="mobile-shell-section" style="padding:14px 14px 0;">
      <div class="mobile-section-title">Instellingen</div>
      <div class="dash-sub">Beheer bedrijfsgegevens, medewerkers, certificaten en keuzelijsten in dezelfde lichte enterprise-stijl.</div>
      <div class="mobile-summary-grid" style="margin-top:10px;">
        <div class="mobile-summary-card"><div class="mobile-summary-label">Modules</div><div class="mobile-summary-value">4</div></div>
        <div class="mobile-summary-card"><div class="mobile-summary-label">Weergave</div><div class="mobile-summary-value">Responsive</div></div>
      </div>
    </section>
  <div class="panel-head">
    <div class="panel-tools">
      <button class="btn" id="btnApps">Apps</button>
      <input class="input" id="q" placeholder="Zoek in instellingen" />
    </div>
    
  </div>

  <div class="tabs" id="tabs"></div>

  <div class="tiles" id="content"></div>
  </main>

  <script src="../js/core/routes.js"></script>
  <script src="../js/core/design_system.js"></script>
  <script src="../js/core/store.js"></script>
  <script src="../js/core/permissions.js"></script>
  <script src="../js/core/ui.js"></script>
  <script src="../js/core/apps_menu.js"></script>
  <script src="../js/core/export.js"></script>
    <script src="../js/core/pwa.js"></script>
  <script src="../js/core/icon_pack.js"></script>
  <script src="../js/core/shell.js"></script>
  <script src="../js/core/workflow_shell.js"></script>
  <script src="../js/core/phase3_finalize.js"></script>

  <script>
    Shell.mount(); try{WorkflowShell.mount();}catch(_){ }

    const TABDEF = [
      {k:"bedrijf", label:"Bedrijf"},
      {k:"werknemers", label:"Werknemers"},
      {k:"certificaten", label:"Certificaten"},
      {k:"keuzelijsten", label:"Keuzelijsten"}
    ];

    function getTab(){
      const st = window.CWS.getState();
      return st.ui.view.instellingenTab || "bedrijf";
    }
    function setTab(k){
      const st = window.CWS.getState();
      st.ui.view.instellingenTab = k;
      window.CWS.setState(st);
      render();
    }

    function renderTabs(){
      const wrap = document.getElementById("tabs");
      const active = getTab();
      wrap.innerHTML = TABDEF.map(t=>(
        '<div class="tab '+(t.k===active?'active':'')+'" data-k="'+t.k+'">'+UI.esc(t.label)+'</div>'
      )).join("");
      wrap.onclick = (e)=>{
        const el = e.target.closest(".tab");
        if(!el) return;
        setTab(el.getAttribute("data-k"));
      };
    }

    function tableWrap(html){
      return '<div class="table-wrap">'+html+'</div>';
    }

    function viewBedrijf(st, q){
      const c = st.settings.company || {name:"",address:"",email:"",phone:""};
      const match = (c.name+" "+c.address+" "+c.email+" "+c.phone).toLowerCase().includes(q);
      if(q && !match) return '<div class="tiles"><div class="card">Geen resultaten.</div></div>';

      const html = `

        <div class="card" style="margin-bottom:12px">
          <div style="display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap">
            <div>
              <div style="font-weight:800">API & Omgeving</div>
              <div class="smallmuted">Stel de API Base URL in voor deze browser (localStorage). Default voor Pages is <b>/api</b> (same‑origin proxy). Voor directe backend kun je bv. https://api.nen1090.nl gebruiken.</div>
            </div>
            <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap">
              <input class="input" id="apiBaseUrl" style="min-width:320px" placeholder="/api" />
              <button class="btn" id="btnSaveApiBaseUrl">Opslaan</button>
              <button class="btn" id="btnResetApiBaseUrl">Reset</button>
              <button class="btn" id="btnTestApiBaseUrl">Test verbinding</button>
              <span class="smallmuted" id="apiTestResult" style="margin-left:8px"></span>
            </div>
          </div>
        </div>

        <div class="panel-head">
          <div class="panel-tools">
            <button class="btn" id="btnEditCompany">Bewerk</button>
          </div>
          
        </div>
        ${tableWrap(`
          <table class="mobile-cards">
            <thead><tr><th>Naam</th><th>Adres</th><th>Email</th><th>Telefoon</th><th>Actie</th></tr></thead>
            <tbody id="companyRows">
              <tr data-id="company">
                <td data-label="Naam">${UI.esc(c.name)}</td>
                <td data-label="Adres">${UI.esc(c.address)}</td>
                <td data-label="Email">${UI.esc(c.email)}</td>
                <td data-label="Telefoon">${UI.esc(c.phone)}</td>
                <td data-label="Actie"><button class="smallbtn" data-act="edit">Edit</button></td>
              </tr>
            </tbody>
          </table>
        `)}

        <div class="card" style="margin-top:12px">
          <div style="display:flex; align-items:center; justify-content:space-between; gap:12px">
            <div>
              <div style="font-weight:800">Bedrijfscertificaten</div>
              <div class="smallmuted">Upload meerdere documenten, beheer en verwijder. Scope = company, kind = certificate.</div>
            </div>
            <div style="display:flex; gap:8px; align-items:center">
              <select class="input" id="companyCertType" style="min-width:190px">
                <option value="EN1090">EN1090</option>
                <option value="ISO3834">ISO3834</option>
                <option value="IWT/IWE">IWT/IWE</option>
                <option value="ISO9606">ISO9606</option>
                <option value="Overig" selected>Overig</option>
              </select>
              <input class="input" type="file" id="companyCertFiles" multiple />
              <button class="btn" id="btnUploadCompanyCerts">Upload certificaten</button>
            </div>
          </div>
          <div class="table-wrap" style="margin-top:10px">
            <table class="mobile-cards">
              <thead>
                <tr>
                  <th>Bestandsnaam</th>
                  <th>Type</th>
                  <th>Geldig tot</th>
                  <th>Upload datum</th>
                  <th>Acties</th>
                </tr>
              </thead>
              <tbody id="companyCertRows">
                <tr><td colspan="5" class="smallmuted">Nog geen certificaten (of niet ingelogd).</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      `;
      return html;
    }

    function viewWerknemers(st, q){
      const ids = (st.settings.workers?.order||[]);
      const list = ids.map(id=>st.settings.workers.byId[id]).filter(Boolean)
        .filter(w=>!q || ((w.id+" "+w.naam+" "+w.rol).toLowerCase().includes(q)));

      const rows = list.map(w=>`
        <tr data-id="${UI.esc(w.id)}">
          <td data-label="ID">${UI.esc(w.id)}</td>
          <td data-label="Naam">${UI.esc(w.naam||"")}</td>
          <td data-label="Rol">${UI.esc(w.rol||"")}</td>
          <td data-label="Geldig tot">${UI.esc(w.geldigTot||"")}</td>
          <td><button class="smallbtn" data-act="edit">Edit</button> <button class="smallbtn" data-act="del">Verwijderen</button></td>
        </tr>
      `).join("") || '<tr><td colspan="5" class="smallmuted">Geen werknemers.</td></tr>';

      return `
        <div class="panel-head">
          <div class="panel-tools">
            <button class="btn" id="btnNewWorker">Nieuw</button>
            <button class="btn" id="btnWorkerCols">Kolommen</button>
          </div>
          
        </div>
        ${tableWrap(`
          <table class="mobile-cards">
            <thead><tr id="workerHead"></tr></thead>
            <tbody id="workerRows">${rows}</tbody>
          </table>
        `)}
      `;
    }

    function viewCertificaten(st, q){
      const list = Object.values(st.certs?.byId||{}).filter(Boolean)
        .filter(c=>!q || ((c.id+" "+(c.name||"")+" "+(c.type||"")+" "+(c.ref||"")).toLowerCase().includes(q)));

      const rows = list.map(c=>`
        <tr data-id="${UI.esc(c.id)}">
          <td data-label="Type">${UI.esc(c.type||"")}</td>
          <td data-label="ID">${UI.esc(c.id)}</td>
          <td data-label="Naam">${UI.esc(c.name||"")}</td>
          <td data-label="Referentie">${UI.esc(c.ref||"")}</td>
          <td data-label="Geldig tot">${UI.esc(c.validTo||"")}</td>
          <td><button class="smallbtn" data-act="edit">Edit</button> <button class="smallbtn" data-act="del">Verwijderen</button></td>
        </tr>
      `).join("") || '<tr><td colspan="6" class="smallmuted">Geen certificaten.</td></tr>';

      return `
        <div class="panel-head">
          <div class="panel-tools">
            <button class="btn" id="btnNewCert">Nieuw</button>
            <button class="btn" id="btnCertCols">Kolommen</button>
          </div>
          
        </div>
        ${tableWrap(`
          <table class="mobile-cards">
            <thead><tr id="certHead"></tr></thead>
            <tbody id="settingsCertRows">${rows}</tbody>
          </table>
        `)}
      `;
    }

    function listCard(title, key, values){
      const rows = (values||[]).map((v, i)=>`<tr data-id="${i}"><td data-label="Waarde">${UI.esc(v)}</td><td data-label="Actie"><button class="smallbtn" data-act="edit">Edit</button> <button class="smallbtn" data-act="del">Verwijderen</button></td></tr>`).join("")
        || '<tr><td colspan="2" class="smallmuted">Leeg.</td></tr>';
      return `
        <div class="card">
          <div class="panel-head" style="margin:-10px -10px 10px -10px;">
            <div class="panel-tools">
              <span class="pillmini">${UI.esc(title)}</span>
              <button class="btn" data-list-new="${UI.esc(key)}">Nieuw</button>
            </div>
            
          </div>
          ${tableWrap(`
            <table class="mobile-cards">
              <thead><tr><th>Waarde</th><th>Actie</th></tr></thead>
              <tbody data-list-body="${UI.esc(key)}">${rows}</tbody>
            </table>
          `)}
        </div>
      `;
    }

    function viewKeuzelijsten(st, q){
      const lists = st.settings.lists || {};
      // filter cards by q
      const cards = [
        ["Lasprocessen (ISO 4063)","processes", lists.processes||[]],
        ["NDO-methoden","ndoMethods", lists.ndoMethods||[]],
        ["Materialen","materials", lists.materials||[]],
        ["Toevoegmaterialen","fillerMaterials", lists.fillerMaterials||[]],
      ].filter(([t,k,arr])=>{
        if(!q) return true;
        const s = (t+" "+(arr||[]).join(" ")).toLowerCase();
        return s.includes(q);
      }).map(([t,k,arr])=>listCard(t,k,arr)).join("");

      return `<div class="tiles"><div class="tilegrid">${cards || '<div class="card">Geen resultaten.</div>'}</div></div>`;
    }

    function render(){
      renderTabs();
      const st = window.CWS.getState();
      const tab = getTab();
      const q = (document.getElementById("q").value||"").toLowerCase().trim();

      let html = "";
      if(tab==="bedrijf") html = viewBedrijf(st, q);
      if(tab==="werknemers") html = viewWerknemers(st, q);
      if(tab==="certificaten") html = viewCertificaten(st, q);
      if(tab==="keuzelijsten") html = viewKeuzelijsten(st, q);

      document.getElementById("content").innerHTML = html;
      try{ document.querySelectorAll("#content table").forEach(t=>t.classList.add("mobile-cards")); window.MobileUI && window.MobileUI.annotateAll(document.getElementById("content")); }catch(_){ }

      bind(tab);
    }

    function getColsCfg(stateKey, cols){
      const st = window.CWS.getState();
      st.ui.view = st.ui.view || {};
      const cfg = st.ui.view[stateKey] || { order: cols.map(c=>c.key), hidden: [] };
      const order = (cfg.order||[]).filter(k=>cols.some(c=>c.key===k));
      cols.forEach(c=>{ if(!order.includes(c.key)) order.push(c.key); });
      const hidden = new Set(cfg.hidden||[]);
      const visible = order.filter(k=>!hidden.has(k));
      return {order, hidden, visible};
    }

    function renderDynTable(headEl, bodyEl, stateKey, cols, items, rowIdFn){
      const cfg = getColsCfg(stateKey, cols);
      headEl.innerHTML = cfg.visible.map(k=>`<th data-k="${UI.esc(k)}" draggable="true">${UI.esc(cols.find(c=>c.key===k).label)}</th>`).join("");
      bodyEl.innerHTML = items.length ? items.map(it=>{
        const id = rowIdFn(it);
        return `<tr data-id="${UI.esc(id)}">` + cfg.visible.map(k=>{
          const col = cols.find(c=>c.key===k);
          return `<td>${col ? col.cell(it) : ""}</td>`;
        }).join("") + `</tr>`;
      }).join("") : `<tr><td colspan="${cfg.visible.length||1}" class="smallmuted">Geen items.</td></tr>`;

      let drag=null;
      headEl.ondragstart = (e)=>{ const th=e.target.closest("th[data-k]"); if(!th) return; drag=th; e.dataTransfer.effectAllowed="move"; };
      headEl.ondragover = (e)=>{ e.preventDefault(); const th=e.target.closest("th[data-k]"); if(!th||!drag||th===drag) return;
        const rect=th.getBoundingClientRect(); const before=(e.clientX-rect.left)<rect.width/2;
        headEl.insertBefore(drag, before?th:th.nextSibling);
      };
      headEl.ondrop = (e)=>{ e.preventDefault(); if(!drag) return;
        const newOrder=[...headEl.querySelectorAll("th[data-k]")].map(x=>x.getAttribute("data-k"));
        const st2=window.CWS.getState(); st2.ui.view=st2.ui.view||{};
        const old=st2.ui.view[stateKey]||{order:cols.map(c=>c.key),hidden:[]};
        const hidden=old.hidden||[];
        st2.ui.view[stateKey]={order:[...newOrder, ...hidden.filter(k=>!newOrder.includes(k))], hidden};
        window.CWS.setState(st2); drag=null; render();
      };
    }

    function bind(tab){
      const st = window.CWS.getState();

      
      if(tab==="bedrijf"){
        // ----- Phase 9: API Base URL (per browser) -----
        const apiInp = document.getElementById("apiBaseUrl");
        const btnSaveApi = document.getElementById("btnSaveApiBaseUrl");
        const btnResetApi = document.getElementById("btnResetApiBaseUrl");
        if(apiInp){
          const cur = (localStorage.getItem("nen1090.api.baseUrl") || localStorage.getItem("API_BASE_URL") || window.__API_BASE_URL__ || "/api").replace(/\/$/, "");
          apiInp.value = cur;
        }
        if(btnSaveApi){
          btnSaveApi.onclick = ()=>{
            const v = (apiInp?.value || "").trim().replace(/\/$/, "");
            if(!v){ UI.toast("Geen URL ingevuld."); return; }
            localStorage.setItem("nen1090.api.baseUrl", v);
            localStorage.setItem("API_BASE_URL", v);
            UI.toast("API Base URL opgeslagen.");
          };
        }
        if(btnResetApi){
          btnResetApi.onclick = ()=>{
            localStorage.removeItem("nen1090.api.baseUrl");
            localStorage.removeItem("API_BASE_URL");
            UI.toast("API Base URL gereset.");
            if(apiInp) apiInp.value = (window.__API_BASE_URL__ || "/api").replace(/\/$/, "");
          };
        }

        const open = ()=>{
          const c = (window.CWS.getState().settings.company||{});
          UI.modalForm({
            title:"Bedrijf bewerken",
            submitLabel:"Opslaan",
            values:c,
            fields:[
              {key:"name", label:"Naam"},
              {key:"address", label:"Adres", type:"textarea", rows:3},
              {key:"email", label:"Email"},
              {key:"phone", label:"Telefoon"}
            ],
            onSubmit:(v)=>{
              window.CWS.updateCompany(v);
              UI.toast("Opgeslagen.");
              render();
            }
          });
        };
        document.getElementById("btnEditCompany").onclick = open;

        // ----- Phase 2: Company certificates (attachments) -----
        const certRows = document.getElementById('companyCertRows');
        const btnUpload = document.getElementById('btnUploadCompanyCerts');
        const inpFiles = document.getElementById('companyCertFiles');
        const selType = document.getElementById('companyCertType');

        async function refreshCompanyCerts(){
          if(!certRows) return;
          try{
            const tid = (window.Auth && window.Auth.attachments && window.Auth.attachments.tenantId) ? window.Auth.attachments.tenantId() : '';
            if(!tid){
              certRows.innerHTML = '<tr><td colspan="5" class="smallmuted">Niet ingelogd (geen tenant_id). Log in om certificaten te beheren.</td></tr>';
              return;
            }
            const items = await window.Auth.attachments.list({scope_type:'company', scope_id:tid, kind:'certificate'});
            if(!items || !items.length){
              certRows.innerHTML = '<tr><td colspan="5" class="smallmuted">Nog geen certificaten.</td></tr>';
              return;
            }
            certRows.innerHTML = items.map(a=>{
              const meta = (()=>{ try{return a.meta||{};}catch{return {};}})();
              const ctype = meta.certificate_type || meta.type || '';
              return `
                <tr data-id="${UI.esc(a.id)}">
                  <td>${UI.esc(a.filename||'')}</td>
                  <td>${UI.esc(ctype||'')}</td>
                  <td>${UI.esc(a.valid_until||'')}</td>
                  <td>${UI.esc((a.uploaded_at||'').replace('T',' ').replace('Z',''))}</td>
                  <td>
                    <button class="smallbtn" data-act="dl">Download</button>
                    <button class="smallbtn" data-act="del">Verwijderen</button>
                  </td>
                </tr>
              `;
            }).join('');
          }catch(err){
            certRows.innerHTML = '<tr><td colspan="5" class="smallmuted">Kon certificaten niet laden.</td></tr>';
            console.warn('attachments list failed', err);
          }
        }

        if(btnUpload){
          btnUpload.onclick = async ()=>{
            try{
              const files = Array.from((inpFiles && inpFiles.files) ? inpFiles.files : []);
              if(!files.length){ UI.toast('Kies eerst één of meerdere bestanden.'); return; }
              const tid = window.Auth.attachments.tenantId();
              const certType = (selType && selType.value) ? selType.value : 'Overig';
              btnUpload.disabled = true;
              const res = await window.Auth.attachments.upload({
                files,
                scope_type:'company',
                scope_id:tid,
                kind:'certificate',
                meta:{certificate_type: certType}
              });
              if(inpFiles) inpFiles.value = '';
              UI.toast(`Geüpload: ${(res && res.length) ? res.length : 0}`);
              await refreshCompanyCerts();
            }catch(err){
              UI.toast('Upload mislukt.');
              console.warn('upload failed', err);
            }finally{
              btnUpload.disabled = false;
            }
          };
        }

        if(certRows){
          certRows.onclick = async (e)=>{
            const tr = e.target.closest('tr[data-id]');
            if(!tr) return;
            const id = tr.getAttribute('data-id');
            const act = (e.target.closest('button')||{}).getAttribute('data-act');
            if(act==='del'){
              if(!confirm('Certificaat verwijderen?')) return;
              try{ await window.Auth.attachments.remove(id); UI.toast('Verwijderd.'); await refreshCompanyCerts(); }
              catch(err){ UI.toast('Verwijderen mislukt.'); console.warn(err); }
            }
            if(act==='dl'){
              try{
                const blob = await window.Auth.attachments.downloadBlob(id);
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'certificaat';
                document.body.appendChild(a);
                a.click();
                a.remove();
                setTimeout(()=>URL.revokeObjectURL(url), 2000);
              }catch(err){ UI.toast('Download mislukt.'); console.warn(err); }
            }
          };
          refreshCompanyCerts();
        }
        const body = document.getElementById("companyRows");
        if(body){
          UI.bindRowDblClick(body, ()=>open());
          body.onclick = (e)=>{
            const btn = e.target.closest("button[data-act='edit']");
            if(btn) open();
          };
        }
      }

      if(tab==="werknemers"){
        const body = document.getElementById("workerRows");
        const head = document.getElementById("workerHead");
        const st0 = window.CWS.getState();
        const ids = (st0.settings.workers?.order||[]);
        const q = (document.getElementById("q").value||"").toLowerCase().trim();
        const items = ids.map(id=>st0.settings.workers.byId[id]).filter(Boolean).filter(w=>!q || ((w.id+" "+w.naam+" "+w.rol+" "+(w.email||"")).toLowerCase().includes(q)));
        const WCOLS = [
          {key:"id", label:"ID", cell:(w)=>UI.esc(w.id)},
          {key:"naam", label:"Naam", cell:(w)=>UI.esc(w.naam||"")},
          {key:"rol", label:"Rol", cell:(w)=>UI.esc(w.rol||"")},
          {key:"telefoon", label:"Telefoon", cell:(w)=>UI.esc(w.telefoon||"")},
          {key:"email", label:"Email", cell:(w)=>UI.esc(w.email||"")},
          {key:"adres", label:"Adres", cell:(w)=>UI.esc(w.adres||"")},
          {key:"postcode", label:"Postcode", cell:(w)=>UI.esc(w.postcode||"")},
          {key:"woonplaats", label:"Woonplaats", cell:(w)=>UI.esc(w.woonplaats||"")},
          // kwalificatie-samenvatting (volgens 'Summary of Welding Qualification' layout)
          {key:"certificaten", label:"Certificaten (#)", cell:(w)=>{
            const st = window.CWS.getState();
            const cs = Object.values(st.certs?.byId||{}).filter(c=>c && c.type==="lassers" && (c.welderId===w.id));
            return UI.esc(String(cs.length));
          }},
          {key:"certificateNo", label:"Certificate No.", cell:(w)=>{
            const st = window.CWS.getState();
            const cs = Object.values(st.certs?.byId||{}).filter(c=>c && c.type==="lassers" && (c.welderId===w.id));
            return UI.esc(cs.map(c=>c.certificateNo||c.id).slice(0,2).join(", ") + (cs.length>2?" …":""));
          }},
          {key:"weldingProcess", label:"Welding process", cell:(w)=>{
            const st = window.CWS.getState();
            const cs = Object.values(st.certs?.byId||{}).filter(c=>c && c.type==="lassers" && (c.welderId===w.id));
            const u = [...new Set(cs.map(c=>c.weldingProcess).filter(Boolean))];
            return UI.esc(u.join(", "));
          }},
          {key:"typeOfWeld", label:"Type of weld", cell:(w)=>{
            const st = window.CWS.getState();
            const cs = Object.values(st.certs?.byId||{}).filter(c=>c && c.type==="lassers" && (c.welderId===w.id));
            const u = [...new Set(cs.map(c=>c.typeOfWeld).filter(Boolean))];
            return UI.esc(u.join(", "));
          }},
          {key:"baseMetal", label:"Base metal", cell:(w)=>{
            const st = window.CWS.getState();
            const cs = Object.values(st.certs?.byId||{}).filter(c=>c && c.type==="lassers" && (c.welderId===w.id));
            const u = [...new Set(cs.map(c=>c.baseMetal).filter(Boolean))];
            return UI.esc(u.join(", "));
          }},

            if(act==="edit") openEditListItem(key, idx);
            if(act==="del"){
              if(confirm("Item verwijderen?")){
                const st2 = window.CWS.getState();
                const arr = (st2.settings.lists[key]||[]).slice();
                arr.splice(idx,1);
                window.CWS.updateList(key, arr);
                UI.toast("Verwijderd.");
                render();
              }
            }
          };
        });
      }
    }

    function fileToDataUrl(file){
      return new Promise((resolve,reject)=>{
        const r = new FileReader();
        r.onload = ()=>resolve(String(r.result||""));
        r.onerror = ()=>reject(r.error||new Error("File read failed"));
        r.readAsDataURL(file);
      });
    }

    function openEditListItem(key, idx){
      const st = window.CWS.getState();
      const arr = (st.settings.lists[key]||[]);
      const cur = arr[idx];
      if(cur===undefined) return;
      UI.modalForm({
        title:"Item bewerken",
        submitLabel:"Opslaan",
        values:{value:cur},
        fields:[{key:"value", label:"Waarde"}],
        onSubmit:(v)=>{
          const val = (v.value||"").trim();
          if(!val){ UI.toast("Waarde verplicht."); return false; }
          const st2 = window.CWS.getState();
          const a2 = (st2.settings.lists[key]||[]).slice();
          a2[idx] = val;
          window.CWS.updateList(key, a2);
          UI.toast("Opgeslagen.");
          render();
        }
      });
    }

    document.getElementById("btnApps").addEventListener("click", ()=>AppsMenu.show());
    document.getElementById("q").addEventListener("input", render);

    window.addEventListener('cws_project_changed', ()=>{ /* instellingen is project-onafhankelijk */ });
    render();
  </script>
  <script type="module" src="../js/core/phasef_bindings.js"></script>
</body>
</html>
