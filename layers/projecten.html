<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="../css/theme.css" />
  <title>Projecten</title>
</head>
<body data-title="Projecten">
  <div class="panel-head">
    <div class="panel-tools">
      <input class="input" id="q" placeholder="Zoek project (fuzzy)" />
      <button class="btn" id="btnNew">Nieuw</button>
      <button class="btn" id="btnExport">Export</button>
      <button class="btn" id="btnCols">Kolommen</button>
    </div>
    <div class="kbd">Dubbelklik rij → bewerken • Rechtsklik rij → menu</div>
  </div>

  <div class="tabs" id="tabs"></div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr id="theadRow"></tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
  </div>

  <div class="footerbar">
    <div id="count">0 projecten</div>
    <div class="pagination">
      <button class="pagebtn" disabled>‹</button>
      <span>1</span>
      <button class="pagebtn" disabled>›</button>
    </div>
  </div>

  <script src="../js/core/store.js"></script>
  <script src="../js/core/permissions.js"></script>
  <script src="../js/core/ui.js"></script>
  <script src="../js/core/apps_menu.js"></script>
  <script src="../js/core/export.js"></script>
  <script src="../js/core/auth_client.js"></script>
  <script src="../js/core/shell.js"></script>
  

  <script>
    Shell.mount();

    // =====================
    // Phase 3.1: Projects from backend API (JWT)
    // We keep the local CWS store as UI cache, but sync projects from/to the backend.
    // =====================

    function isLoggedIn(){
      try{ return !!(window.Auth && (window.Auth.getAccessToken?.() || localStorage.getItem('nen1090.auth.access') || localStorage.getItem('auth_token'))); }catch(_){ return false; }
    }

    function apiToLocal(p){
      return {
        id: p.id,
        nummer: p.code || '',
        naam: p.name || '',
        opdrachtgever: p.client_name || '',
        exc: p.execution_class || '',
        acceptatieklasse: p.acceptance_class || '',
        status: p.status || 'in_controle',
        locked: !!p.locked,
        laatstGewijzigd: (p.updated_at || p.created_at || '').toString()
      };
    }

    function localToApi(v){
      return {
        code: (v.nummer||'').trim(),
        name: v.naam || '',
        client_name: v.opdrachtgever || '',
        execution_class: v.exc || 'EXC2',
        acceptance_class: v.acceptatieklasse || 'B',
        status: v.status || 'in_controle',
        locked: !!v.locked
      };
    }

    async function syncProjectsFromApi(){
      if(!isLoggedIn()) return false;
      try{
        const list = await window.Auth.projects.list();
        const st = window.CWS.getState();
        st.projects.byId = {};
        st.projects.order = [];
        (list||[]).forEach(p=>{
          const lp = apiToLocal(p);
          st.projects.byId[lp.id] = lp;
          st.projects.order.push(lp.id);
        });
        if(!st.ui.activeProjectId && st.projects.order.length) st.ui.activeProjectId = st.projects.order[0];
        window.CWS.setState(st);
        return true;
      }catch(e){
        console.error(e);
        UI.toast('API projecten laden mislukt.');
        return false;
      }
    }

    const TABDEF = [
      {k:"alle", label:"Alle projecten"},
      {k:"in_controle", label:"In controle"},
      {k:"conform", label:"Conform"},
      {k:"afgekeurd", label:"Afgekeurd"},
      {k:"locked", label:"Locked"}
    ];

    function statusBadge(st){
      const map = {
        'Concept':'badge badge-gray',
        'In controle':'badge badge-blue',
        'Goedgekeurd':'badge badge-green',
        'Gesloten':'badge badge-dark',
        "in_controle": ["In controle", "var(--st-ingepland)"],
        "conform": ["Conform", "var(--st-uitvoering)"],
        "afgekeurd": ["Afgekeurd", "var(--st-teplannen)"],
        "locked": ["Locked", "#111827"]
      };
      const m = map[st] || ["Open", "var(--st-ingepland)"];
      return '<span class="badge" style="background:'+m[1]+'">'+UI.esc(m[0])+'</span>';
    }

    function fuzzy(hay, q){
      hay = (hay||"").toLowerCase();
      q = (q||"").toLowerCase().trim();
      if(!q) return true;
      // simple token contains
      return q.split(/\s+/).every(t=>hay.includes(t));
    }

    function getTab(){
      const st = window.CWS.getState();
      return st.ui.view.projectenTab || "alle";
    }
    function setTab(k){
      const st = window.CWS.getState();
      st.ui.view.projectenTab = k;
      window.CWS.setState(st);
    render();
    }

    function renderTabs(){
      const wrap = document.getElementById("tabs");
      const active = getTab();
      wrap.innerHTML = TABDEF.map(t=>(
        '<div class="tab '+(t.k===active?'active':'')+'" data-k="'+t.k+'">'+UI.esc(t.label)+'</div>'
      )).join("");
      wrap.onclick = (e)=>{
        const el = e.target.closest(".tab");
        if(!el) return;
        setTab(el.getAttribute("data-k"));
      };
    }

    function filteredProjects(){
      const st = window.CWS.getState();
      const tab = getTab();
      const q = document.getElementById("q").value;
      const ids = st.projects.order.slice();
      return ids
        .map(id=>st.projects.byId[id])
        .filter(p=>{
          if(!p) return false;
          if(tab==="alle"){}
          else if(tab==="locked") { if(!p.locked && p.status!=="locked") return false; }
          else { if(p.status!==tab) return false; }
          const hay = [p.nummer,p.naam,p.opdrachtgever,p.exc,p.acceptatieklasse,p.status].join(" ");
          return fuzzy(hay, q);
        });
    }

    const COLS = [
      {key:"nummer", label:"Projectnummer", cell:(p)=>UI.esc(p.nummer)},
      {key:"naam", label:"Projectnaam", cell:(p)=>UI.esc(p.naam)},
      {key:"opdrachtgever", label:"Opdrachtgever", cell:(p)=>UI.esc(p.opdrachtgever)},
      {key:"exc", label:"Executieklasse", cell:(p)=>UI.esc(p.exc)},
      {key:"acceptatieklasse", label:"Acceptatieklasse", cell:(p)=>UI.esc(p.acceptatieklasse)},
      {key:"status", label:"Status", cell:(p)=>statusBadge(p.status)},
      {key:"laatstGewijzigd", label:"Laatst gewijzigd", cell:(p)=>UI.esc((p.laatstGewijzigd||"").replace("T"," ").slice(0,16))},
      {key:"actie", label:"Actie", cell:(p)=>{
        const dis = p.locked ? "disabled" : "";
        const title = p.locked ? "title=\"Locked project\"" : "";
        return `<button class="smallbtn" data-act="edit" ${dis} ${title}>Edit</button> <button class="smallbtn" data-act="del" ${dis} ${title}>Verwijderen</button>`;
      }}
    ];

    function getColCfg(){
      const st = window.CWS.getState();
      st.ui.view = st.ui.view || {};
      const cfg = st.ui.view.projectenCols || { order: COLS.map(c=>c.key), hidden: [] };
      const order = (cfg.order||[]).filter(k=>COLS.some(c=>c.key===k));
      COLS.forEach(c=>{ if(!order.includes(c.key)) order.push(c.key); });
      const hidden = new Set(cfg.hidden||[]);
      const visible = order.filter(k=>!hidden.has(k));
      return {order, hidden, visible};
    }

    function renderHeader(){
      const cfg = getColCfg();
      document.getElementById("theadRow").innerHTML =
        cfg.visible.map(k=>`<th data-k="${UI.esc(k)}" draggable="true">${UI.esc(COLS.find(c=>c.key===k).label)}</th>`).join("");
    }

    function applyHeaderDrag(){
      const tr = document.getElementById("theadRow");
      let dragTh=null;
      tr.addEventListener("dragstart",(e)=>{
        const th = e.target.closest("th[data-k]");
        if(!th) return;
        dragTh = th;
        e.dataTransfer.effectAllowed="move";
      });
      tr.addEventListener("dragover",(e)=>{
        e.preventDefault();
        const th = e.target.closest("th[data-k]");
        if(!th || !dragTh || th===dragTh) return;
        const rect = th.getBoundingClientRect();
        const before = (e.clientX - rect.left) < rect.width/2;
        tr.insertBefore(dragTh, before ? th : th.nextSibling);
      });
      tr.addEventListener("drop",(e)=>{
        e.preventDefault();
        if(!dragTh) return;
        const newOrder = [...tr.querySelectorAll("th[data-k]")].map(x=>x.getAttribute("data-k"));
        const st = window.CWS.getState();
        st.ui.view = st.ui.view || {};
        const cfg = st.ui.view.projectenCols || {order: COLS.map(c=>c.key), hidden: []};
        // keep hidden cols appended
        const hidden = cfg.hidden||[];
        const full = [...newOrder, ...hidden.filter(k=>!newOrder.includes(k))];
        st.ui.view.projectenCols = { order: full, hidden };
        window.CWS.setState(st);
        dragTh=null;
        render();
      });
    }

    function render(){
      
      renderTabs();
      if(!window.__projHeadDrag){ applyHeaderDrag(); window.__projHeadDrag=true; }

      const rows = document.getElementById("rows");
      const list = filteredProjects();
      document.getElementById("count").textContent = list.length + " projecten";

      renderHeader();
      const cfg = getColCfg();
      rows.innerHTML = list.map(p=>(
        '<tr data-id="'+UI.esc(p.id)+'">' +
        cfg.visible.map(k=>{
          const col = COLS.find(c=>c.key===k);
          return '<td>'+ (col ? col.cell(p) : '') +'</td>';
        }).join('') +
        '</tr>'
      )).join("");

      rows.ondblclick = (e)=>{
        const tr = e.target.closest("tr");
        if(!tr) return;
        const st2 = window.CWS.getState(); st2.ui.activeProjectId = tr.getAttribute('data-id'); window.CWS.setState(st2);
      editProject(tr.getAttribute("data-id"));
      };
      // single click always opens edit popup
    rows.addEventListener("click",(e)=>{
      const tr = e.target.closest("tr[data-id]");
      if(!tr) return;
      if(e.target.closest("button")) return;
      editProject(tr.getAttribute("data-id"));
    });

    rows.oncontextmenu = (e)=>{
        const tr = e.target.closest("tr");
        if(!tr) return;
        e.preventDefault();
        // simple context actions via confirm/toast
        UI.toast("Contextmenu: Bewerk / Dupliceer / Verwijder (stub)");
      };
      rows.onclick = (e)=>{
        const btn = e.target.closest("button");
        if(!btn) return;
        const tr = e.target.closest("tr");
        const id = tr?.getAttribute("data-id");
        const act = btn.getAttribute("data-act");
        if(act==="edit") editProject(id);
        if(act==="del") deleteProject(id);
      };
    }

    function editProject(id){
      const st = window.CWS.getState();
      const p0 = st.projects.byId[id];
      if(!p0){ UI.toast("Project niet gevonden."); return; }

      const ro = !window.CWS.canEditProject(p0);
      const statuses = ["in_controle","conform","afgekeurd","locked"];
      const cur = p0.status || "in_controle";

      UI.modalForm({
        title: "Project bewerken",
        submitLabel: ro ? "Sluiten" : "Opslaan",
        values: {
          nummer: p0.nummer||p0.id,
          naam: p0.naam||"",
          opdrachtgever: p0.opdrachtgever||"",
          exc: p0.exc||"EXC2",
          acceptatieklasse: p0.acceptatieklasse||"B",
          status: cur
        },
        fields: [
          {key:"nummer", label:"Projectnummer", readonly:true},
          {key:"naam", label:"Projectnaam", readonly: ro},
          {key:"opdrachtgever", label:"Opdrachtgever", readonly: ro},
          {key:"exc", label:"EXC", type:"select", options:["EXC1","EXC2","EXC3","EXC4"], readonly: ro},
          {key:"acceptatieklasse", label:"Acceptatieklasse", type:"select", options:["B","C","D"], readonly: ro},
          {key:"status", label:"Status", type:"select", options: statuses, readonly: ro}
        ],
        onSubmit: async (v)=>{
          if(ro) return true;
          try{
            const st2 = window.CWS.getState();
            const curP = st2.projects.byId[id];
            const oldExc = (curP.exc||"...").toString();

            // API-backed when logged in
            if(isLoggedIn()){
              const payload = localToApi({ ...curP, ...v, nummer: curP.nummer || v.nummer || curP.id });
              const saved = await window.Auth.projects.update(id, payload);
              window.CWS.upsertProject(apiToLocal(saved));
              UI.toast("Project opgeslagen (API).");
              // Phase 1: EXC changed? offer apply template
              const newExc = (v.exc || saved.execution_class || oldExc || "").toString();
              if(oldExc && newExc && oldExc !== newExc && window.Auth.phase1){
                try{
                  const tpls = await window.Auth.phase1.listInspectionTemplates(newExc);
                  const tpl = (tpls||[]).find(t=>t.is_default) || (tpls||[])[0];
                  if(!tpl){
                    UI.toast(`EXC gewijzigd naar ${newExc}. Geen inspectie-template gevonden.`);
                  }else{
                    const isAdmin = (window.Permissions && window.Permissions.canAdmin && window.Permissions.canAdmin());
                    const rid = "exc_apply_mode";
                    UI.openModal({
                      title: `EXC gewijzigd naar ${newExc}`,
                      saveLabel: "Uitvoeren",
                      bodyHtml: `
                        <div style="display:grid; gap:10px;">
                          <div>Wil je het bijbehorende inspectie-template toepassen?</div>
                          <div class="smallmuted">Template: <b>${UI.esc(tpl.name||newExc)}</b> (v${UI.esc(tpl.version||1)})</div>
                          <label style="display:flex; gap:8px; align-items:center;"><input type="radio" name="${rid}" value="merge" checked> Toepassen (aanrader) — ontbrekende checks toevoegen</label>
                          <label style="display:flex; gap:8px; align-items:center;"><input type="radio" name="${rid}" value="skip"> Niet toepassen</label>
                          ${isAdmin ? `<label style="display:flex; gap:8px; align-items:center;"><input type="radio" name="${rid}" value="replace"> Vervangen (overschrijven) — admin</label>` : ``}
                          <div class="smallmuted">Merge is veilig (geen dataverlies). Replace is alleen voor admins.</div>
                        </div>
                      `,
                      onSave: async ({close})=>{
                        const sel = document.querySelector(`input[name='${rid}']:checked`)?.value || "merge";
                        if(sel === "skip"){ close(); return; }
                        const res = await window.Auth.phase1.applyInspectionTemplate(id, { template_id: tpl.id, mode: sel });
                        close();
                        UI.toast(`Template toegepast (${sel}). Checks +${res?.checks_added||0}`);
                      }
                    });
                  }
                }catch(e){ console.error(e); }
              }
              render();
              return true;
            }

            // Offline/local fallback
            window.CWS.upsertProject({
              id,
              nummer: curP.nummer||curP.id,
              naam: v.naam||"",
              opdrachtgever: v.opdrachtgever||"",
              exc: v.exc||"EXC2",
              acceptatieklasse: v.acceptatieklasse||"B",
              status: v.status || curP.status || "in_controle",
              locked: !!curP.locked
            });
            UI.toast("Project opgeslagen.");
            render();
            return true;
          }catch(e){
            console.error(e);
            UI.toast(String(e.message||e));
            return false;
          }
        }
      });
    }

    async function deleteProject(id){
      const st = window.CWS.getState();
      const p = st.projects.byId[id];
      if(p && !window.CWS.canEditProject(p)){ UI.toast('Project is locked (read-only).'); return; }
      const ok = confirm("Project verwijderen?");
      if(!ok) return;
      try{
        if(isLoggedIn()){
          await window.Auth.projects.remove(id);
        }
      }catch(e){ console.error(e); }
      const done = window.CWS.removeProject(id);
      UI.toast(done ? "Verwijderd." : "Niet gevonden.");
      render();
    }

    document.getElementById("q").addEventListener("input", render);
    document.getElementById("btnNew").addEventListener("click", ()=>{
      const st = window.CWS.getState();
      if(st.ui.role==='Viewer'){ UI.toast('Viewer kan niet wijzigen.'); return; }

      UI.modalForm({
        title: "Nieuw project",
        submitLabel: "Aanmaken",
        values: {nummer:"P-", naam:"", opdrachtgever:"", exc:"EXC2", acceptatieklasse:"B", status:"in_controle"},
        fields: [
          {key:"nummer", label:"Projectnummer"},
          {key:"naam", label:"Projectnaam"},
          {key:"opdrachtgever", label:"Opdrachtgever"},
          {key:"exc", label:"EXC", type:"select", options:["EXC1","EXC2","EXC3","EXC4"]},
          {key:"acceptatieklasse", label:"Acceptatieklasse", type:"select", options:["B","C","D"]},
          {key:"status", label:"Status", type:"select", options:["in_controle","conform","afgekeurd","locked"]}
        ],
        onSubmit: async (v)=>{
          if(!v.nummer || !v.nummer.trim()){ UI.toast("Projectnummer verplicht."); return false; }
          try{
            if(isLoggedIn()){
              const saved = await window.Auth.projects.create(localToApi(v));
              window.CWS.upsertProject(apiToLocal(saved));
              UI.toast("Project aangemaakt (API).");
              render();
              return true;
            }
          }catch(e){ console.error(e); UI.toast("API aanmaken mislukt."); return false; }

          // Offline/local fallback
          const p = { id: v.nummer.trim(), nummer:v.nummer.trim(), naam:v.naam||"", opdrachtgever:v.opdrachtgever||"", exc:v.exc||"EXC2", acceptatieklasse:v.acceptatieklasse||"B", status:v.status||"in_controle", locked:false };
          window.CWS.upsertProject(p);
          UI.toast("Project aangemaakt.");
          render();
          return true;
        }
      });
    });

    // =====================
    // Phase 5: Project wizard (guided creation)
    // NOTE: Wizard wordt aangeroepen via Hoofdmenu (AppsMenu) en niet meer als knop in de pagina.
    // Hash: #wizard-nieuw-project
    // =====================
    function openProjectWizard(){
      const st = window.CWS.getState();
      if(st.ui.role==='Viewer'){ UI.toast('Viewer kan niet wijzigen.'); return; }

      const defaults = (st.ui && st.ui.defaults) ? st.ui.defaults : {};
      const wiz = {
        idx: 0,
        project: {
          nummer: 'P-',
          naam: '',
          opdrachtgever: '',
          exc: defaults.default_exc || 'EXC2',
          acceptatieklasse: 'B',
          status: 'in_controle'
        },
        applyTemplateMode: 'merge',
        bulkAdd: { wps:true, materials:true, welders:true },
        created: { id:'', api:false },
        isAdmin: false,
        adminChecked: false,
        welds: [],
        weldsLoaded: false
      };

      const steps = [
        {
          title: 'Project — basisgegevens',
          render: ()=>`
            <div class="card">
              <div class="smallmuted" style="font-weight:800; margin-bottom:8px">Vul de projectgegevens in en klik Volgende.</div>
              <div style="display:grid; grid-template-columns:220px 1fr; gap:10px; align-items:center; margin:8px 0;">
                <div class="smallmuted" style="font-weight:800">Projectnummer</div>
                <input class="input" id="wiz_p_nummer" value="${UI.esc(wiz.project.nummer)}" />
              </div>
              <div style="display:grid; grid-template-columns:220px 1fr; gap:10px; align-items:center; margin:8px 0;">
                <div class="smallmuted" style="font-weight:800">Projectnaam</div>
                <input class="input" id="wiz_p_naam" value="${UI.esc(wiz.project.naam)}" />
              </div>
              <div style="display:grid; grid-template-columns:220px 1fr; gap:10px; align-items:center; margin:8px 0;">
                <div class="smallmuted" style="font-weight:800">Opdrachtgever</div>
                <input class="input" id="wiz_p_client" value="${UI.esc(wiz.project.opdrachtgever)}" />
              </div>
              <div class="smallmuted" style="margin-top:8px">Tip: je kunt altijd opslaan als concept en later hervatten.</div>
            </div>
          `,
          apply: ()=>{
            wiz.project.nummer = document.getElementById('wiz_p_nummer').value;
            wiz.project.naam = document.getElementById('wiz_p_naam').value;
            wiz.project.opdrachtgever = document.getElementById('wiz_p_client').value;
          }
        },
        {
          title: 'Stap 2 — Lassen toevoegen',
          render: ()=>`
            <div class="card">
              <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:10px; flex-wrap:wrap">
                <div>
                  <div style="font-weight:900">Lassenlijst</div>
                  <div class="smallmuted">Voeg lassen toe. Dit wordt opgeslagen op projectniveau.</div>
                </div>
                <div style="display:flex; gap:8px; flex-wrap:wrap">
                  <button class="btn primary" id="wiz_weld_new">Nieuwe las</button>
                  <button class="btn" id="wiz_weld_bulk">Bulk toevoegen</button>
                </div>
              </div>

              <div id="wiz_weld_warn" class="pillmini" style="margin-top:10px; display:none; background:#fff7d6; border-color:#f0d18a">⚠️ Geen lassen toegevoegd</div>

              <div style="margin-top:10px; overflow:auto; border:1px solid var(--line); border-radius:12px">
                <table class="table" style="min-width:980px; margin:0">
                  <thead>
                    <tr>
                      <th style="width:140px">Lasnr</th>
                      <th style="width:120px">Proces</th>
                      <th style="width:220px">Locatie</th>
                      <th style="width:160px">Materiaal</th>
                      <th style="width:120px">Dikte</th>
                      <th>Lassers/ploeg</th>
                      <th style="width:160px">Acties</th>
                    </tr>
                  </thead>
                  <tbody id="wiz_weld_rows">
                    <tr><td colspan="7" class="smallmuted" style="padding:12px">Laden…</td></tr>
                  </tbody>
                </table>
              </div>

              <div class="smallmuted" style="margin-top:8px">
                Tip: dubbelklik op een rij om te bewerken. Geen harde validatie; wel waarschuwing bij 0 lassen.
              </div>
            </div>
          `
        },
        {
          title: 'Stap 3 — Lasplan (WPS/WPQR)',
          render: ()=>`
            <div class="card">
              <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:10px; flex-wrap:wrap">
                <div>
                  <div style="font-weight:900">Lasplan koppelen</div>
                  <div class="smallmuted">Koppel WPS/WPQR/WPQ aan dit project. “Alles toevoegen” is idempotent.</div>
                </div>
                <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap">
                  <button class="btn" id="wiz_wps_add_all">➕ Alles toevoegen</button>
                  <button class="btn" id="wiz_wps_add_manual">✍️ Handmatig toevoegen</button>
                  <button class="btn" id="wiz_wps_refresh">↻ Verversen</button>
                </div>
              </div>

              <div id="wiz_wps_warn" class="pillmini" style="margin-top:10px; display:none">⚠️ Nog geen WPS/WPQR gekoppeld.</div>

              <div style="overflow:auto; border:1px solid #e6edf7; border-radius:10px; margin-top:10px;">
                <table class="table" style="min-width:900px">
                  <thead>
                    <tr>
                      <th style="width:180px">Code</th>
                      <th>Omschrijving</th>
                      <th style="width:180px">Documentnr.</th>

      // =====================
      // Step 2 (Lassen) – volledig (Optie B)
      // =====================
      function _coerceWeldPayload(v){
        const out = {
          weld_no: (v.weld_no || '').trim(),
          process: (v.process || '').trim() || null,
          location: (v.location || '').trim() || null,
          material: (v.material || '').trim() || null,
          thickness: (v.thickness || '').trim() || null,
          welders: (v.welders || '').trim() || null,
          notes: (v.notes || '').trim() || null,
        };
        return out;
      }

      function _nextWeldNo(){
        // Try to auto-increment patterns like W-1 / W-001 / 1 etc.
        const list = wiz.welds || [];
        let best = null;
        list.forEach(w=>{
          const s = String(w.weld_no||'').trim();
          const m = s.match(/^(.*?)(\d+)$/);
          if(!m) return;
          const prefix = m[1] || '';
          const n = parseInt(m[2], 10);
          if(isNaN(n)) return;
          const pad = m[2].length;
          if(!best || n > best.n){
            best = { prefix, n, pad };
          }
        });
        if(best){
          const nn = best.n + 1;
          const num = String(nn).padStart(best.pad, '0');
          return `${best.prefix}${num}`;
        }
        return 'W-1';
      }

      function _renderWeldRows(){
        const tbody = document.getElementById('wiz_weld_rows');
        if(!tbody) return;
        const rows = (wiz.welds || []);
        if(!rows.length){
          tbody.innerHTML = `<tr><td colspan="7" class="smallmuted" style="padding:12px">Nog geen lassen. Klik <b>Nieuwe las</b> of <b>Bulk toevoegen</b>.</td></tr>`;
        } else {
          tbody.innerHTML = rows.map(w=>`
            <tr data-weld-id="${UI.esc(String(w.id||''))}">
              <td><b>${UI.esc(w.weld_no||'')}</b></td>
              <td>${UI.esc(w.process||'')}</td>
              <td>${UI.esc(w.location||'')}</td>
              <td>${UI.esc(w.material||'')}</td>
              <td>${UI.esc(w.thickness||'')}</td>
              <td>${UI.esc(w.welders||'')}</td>
              <td>
                <button class="btn xs" data-act="dup">Dupliceer</button>
                <button class="btn xs danger" data-act="del">Verwijder</button>
              </td>
            </tr>
          `).join('');
        }
        const warn = document.getElementById('wiz_weld_warn');
        if(warn) warn.style.display = rows.length ? 'none' : 'inline-flex';
      }

      async function _loadWelds(projectId){
        try{
          if(isLoggedIn()){
            const list = await window.Auth.welds.list(projectId);
            wiz.welds = Array.isArray(list) ? list : [];
            wiz.weldsLoaded = true;
            _renderWeldRows();
            return wiz.welds;
          }
        }catch(e){
          console.error(e);
          UI.toast('Lassen laden mislukt.');
        }
        wiz.welds = wiz.welds || [];
        wiz.weldsLoaded = true;
        _renderWeldRows();
        return wiz.welds;
      }

      function _openBulkAdd(projectId){
        const html = `
          <div class="card">
            <div style="font-weight:900">Bulk toevoegen</div>
            <div class="smallmuted" style="margin-top:6px">Plak regels (CSV/TSV). Kolommen: <b>Lasnr; Proces; Locatie; Materiaal; Dikte; Lassers</b>.</div>
            <textarea class="input" id="wiz_bulk_txt" style="height:180px; margin-top:10px" placeholder="W-1;MAG;Werkplaats;S235;8mm;Ploeg A\nW-2;TIG;Montage;RVS;3mm;Jan"></textarea>
            <div id="wiz_bulk_preview" class="smallmuted" style="margin-top:8px">0 regels</div>
          </div>
        `;
        const m = UI.openModal({
          title: 'Bulk lassen toevoegen',
          saveLabel: 'Toevoegen',
          bodyHtml: html,
          onSave: async ({ close })=>{
            const raw = (document.getElementById('wiz_bulk_txt').value || '').trim();
            if(!raw){ UI.toast('Geen data geplakt.'); return false; }
            const lines = raw.split(/\r?\n/).map(x=>x.trim()).filter(Boolean);
            const items = lines.map(line=>{
              const parts = line.split(/[;\t,]/).map(x=>x.trim());
              return _coerceWeldPayload({
                weld_no: parts[0] || '',
                process: parts[1] || '',
                location: parts[2] || '',
                material: parts[3] || '',
                thickness: parts[4] || '',
                welders: parts[5] || ''
              });
            }).filter(x=>x.weld_no);
            if(!items.length){ UI.toast('Geen geldige regels (Lasnr ontbreekt).'); return false; }

            // Create sequentially (avoids spikes, stable)
            try{
              if(isLoggedIn()){
                for(const it of items){
                  await window.Auth.welds.create(projectId, it);
                }
                await _loadWelds(projectId);
              } else {
                wiz.welds = (wiz.welds || []).concat(items.map(it=>Object.assign({ id: crypto.randomUUID ? crypto.randomUUID() : (Date.now()+Math.random()) }, it)));
                _renderWeldRows();
              }
              UI.toast(`${items.length} lassen toegevoegd.`);
              close();
              return true;
            }catch(e){
              console.error(e);
              UI.toast('Bulk toevoegen mislukt.');
              return false;
            }
          }
        });

        const txtEl = document.getElementById('wiz_bulk_txt');
        const prevEl = document.getElementById('wiz_bulk_preview');
        if(txtEl && prevEl){
          const upd = ()=>{
            const raw = (txtEl.value || '').trim();
            const n = raw ? raw.split(/\r?\n/).map(x=>x.trim()).filter(Boolean).length : 0;
            prevEl.textContent = `${n} regels`;
          };
          txtEl.oninput = upd;
          upd();
        }
        return m;
      }

      async function mountWeldsStep(){
        // Ensure we have a project_id (UUID) for API welds
        const created = await ensureCreated();
        const projectId = created.id;

        // Load list once (or refresh after changes)
        await _loadWelds(projectId);

        const btnNew = document.getElementById('wiz_weld_new');
        const btnBulk = document.getElementById('wiz_weld_bulk');
        if(btnNew){
          btnNew.onclick = async ()=>{
            _openWeldForm({
              title: 'Nieuwe las',
              initial: { weld_no: _nextWeldNo() },
              onSave: async (payload)=>{
                if(isLoggedIn()){
                  await window.Auth.welds.create(projectId, payload);
                  await _loadWelds(projectId);
                } else {
                  wiz.welds = (wiz.welds || []).concat([Object.assign({ id: crypto.randomUUID ? crypto.randomUUID() : (Date.now()+Math.random()) }, payload)]);
                  _renderWeldRows();
                }
              }
            });
          };
        }
        if(btnBulk){
          btnBulk.onclick = ()=>_openBulkAdd(projectId);
        }

        // Row actions
        const tbody = document.getElementById('wiz_weld_rows');
        if(tbody){
          tbody.onclick = async (ev)=>{
            const btn = ev.target && ev.target.closest ? ev.target.closest('button[data-act]') : null;
            if(!btn) return;
            const tr = btn.closest('tr[data-weld-id]');
            const weldId = tr ? tr.getAttribute('data-weld-id') : '';
            const act = btn.getAttribute('data-act');
            const w = (wiz.welds || []).find(x=>String(x.id)===String(weldId));
            if(!w) return;

            if(act==='dup'){
              const copy = Object.assign({}, w);
              delete copy.id;
              copy.weld_no = _nextWeldNo();
              if(isLoggedIn()){
                await window.Auth.welds.create(projectId, _coerceWeldPayload(copy));
                await _loadWelds(projectId);
              } else {
                wiz.welds = (wiz.welds || []).concat([Object.assign({ id: crypto.randomUUID ? crypto.randomUUID() : (Date.now()+Math.random()) }, _coerceWeldPayload(copy))]);
                _renderWeldRows();
              }
            }
            if(act==='del'){
              const ok = window.confirm('Las verwijderen?');
              if(!ok) return;
              if(isLoggedIn()){
                await window.Auth.welds.remove(projectId, weldId);
                await _loadWelds(projectId);
              } else {
                wiz.welds = (wiz.welds || []).filter(x=>String(x.id)!==String(weldId));
                _renderWeldRows();
              }
            }
          };

          tbody.ondblclick = async (ev)=>{
            const tr = ev.target && ev.target.closest ? ev.target.closest('tr[data-weld-id]') : null;
            if(!tr) return;
            const weldId = tr.getAttribute('data-weld-id');
            const w = (wiz.welds || []).find(x=>String(x.id)===String(weldId));
            if(!w) return;
            _openWeldForm({
              title: 'Las bewerken',
              initial: w,
              onSave: async (payload)=>{
                if(isLoggedIn()){
                  await window.Auth.welds.update(projectId, weldId, payload);
                  await _loadWelds(projectId);
                } else {
                  wiz.welds = (wiz.welds || []).map(x=>String(x.id)===String(weldId) ? Object.assign({}, x, payload) : x);
                  _renderWeldRows();
                }
              }
            });
          };
        }
      }

      async function ensureAdminChecked(){
        if(wiz.adminChecked) return wiz.isAdmin;
        wiz.adminChecked = true;
        if(!isLoggedIn()) { wiz.isAdmin = false; return false; }
        try{
          const me = await window.Auth.me();
          wiz.isAdmin = !!(me && (me.is_tenant_admin || me.is_platform_admin || me.role==='Admin'));
          return wiz.isAdmin;
        }catch(_){ wiz.isAdmin = false; return false; }
      }

      function tplStats(items){
        const s = {total:0, groups:{}, required:0, evidence:0};
        (items||[]).forEach(it=>{
          s.total++;
          const g = it.groep || it.group || 'overig';
          s.groups[g] = (s.groups[g]||0) + 1;
          if(it.required) s.required++;
          if(it.evidence_required) s.evidence++;
        });
        return s;
      }

      async function refreshTemplatePreview(){
        const box = document.getElementById('wiz_tpl_preview');
        if(!box) return;
        if(!isLoggedIn()){ box.innerHTML = 'Log in om templates te laden (preview)'; return; }
        try{
          box.innerHTML = 'Template preview laden…';
          const lst = await window.Auth.phase1.listInspectionTemplates(wiz.project.exc);
          if(!lst || !lst.length){ box.innerHTML = 'Geen inspectie-template gevonden voor '+UI.esc(wiz.project.exc)+'.'; return; }
          const tpl = lst.find(t=>t.is_default) || lst[0];
          const items = tpl.items_json || tpl.items || [];
          const st = tplStats(items);
          const grp = Object.keys(st.groups).sort().map(k=>`<span class="pillmini" style="margin-right:6px">${UI.esc(k)}: ${st.groups[k]}</span>`).join('');
          box.innerHTML = `<div style="display:flex; justify-content:space-between; gap:10px; align-items:center">
            <div><b>${UI.esc(tpl.name||'Template')}</b> <span class="smallmuted">(v${UI.esc(String(tpl.version||1))})</span></div>
            <div class="pillmini">Totaal: ${st.total} • Verplicht: ${st.required} • Bewijs: ${st.evidence}</div>
          </div><div style="margin-top:8px">${grp || '<span class="smallmuted">Geen groepen</span>'}</div>`;
        }catch(e){ console.error(e); box.innerHTML = 'Template preview laden mislukt.'; }

      // --- Step 4: NDO plan ---
      async function mountNdoStep(){
        const created = await ensureCreated();
        const projectId = created.id;

        const elReq = document.getElementById('wiz_ndo_required');
        const elMethod = document.getElementById('wiz_ndo_method');
        const elPct = document.getElementById('wiz_ndo_percent');
        const elCnt = document.getElementById('wiz_ndo_count');
        const elNote = document.getElementById('wiz_ndo_note');
        const btnSave = document.getElementById('wiz_ndo_save');
        const warn = document.getElementById('wiz_ndo_warn');

        function read(){
          const required = !!(elReq && elReq.checked);
          const method = (elMethod?.value||'').trim() || null;
          const percent = (elPct?.value||'').trim(); 
          const count = (elCnt?.value||'').trim();
          const note = (elNote?.value||'').trim() || null;
          return {
            required,
            method,
            percent: percent ? Number(percent) : null,
            count: count ? Number(count) : null,
            note
          };
        }

        function validate(){
          const v = read();
          const bad = v.required && (!v.method || (!v.percent && !v.count));
          if(warn) warn.style.display = bad ? 'inline-flex' : 'none';
          return !bad;
        }

        async function load(){
          const ndo = wiz.ndo_plan || null;
          if(ndo){
            if(elReq) elReq.checked = !!ndo.required;
            if(elMethod) elMethod.value = ndo.method || '';
            if(elPct) elPct.value = ndo.percent!=null ? String(ndo.percent) : '';
            if(elCnt) elCnt.value = ndo.count!=null ? String(ndo.count) : '';
            if(elNote) elNote.value = ndo.note || '';
          }else{
            if(elReq) elReq.checked = false;
            if(elMethod) elMethod.value = '';
            if(elPct) elPct.value = '';
            if(elCnt) elCnt.value = '';
            if(elNote) elNote.value = '';
          }
          validate();
        }

        async function save(){
          wiz.ndo_plan = read();
          validate();
          if(isLoggedIn() && window.Auth?.projects && _has(window.Auth.projects.patch)){
            await _apiTry(()=> window.Auth.projects.patch(projectId, { ndo_plan: wiz.ndo_plan }), ()=>null);
          }
          UI.toast('NDO plan opgeslagen');
        }

        if(elReq) elReq.onchange = validate;
        if(elMethod) elMethod.onchange = validate;
        if(elPct) elPct.oninput = validate;
        if(elCnt) elCnt.oninput = validate;
        if(btnSave) btnSave.onclick = save;

        await load();
      }

          if(!items.length){
            if(warn) warn.style.display='inline-flex';
            rows.innerHTML = '<tr><td colspan="5" class="smallmuted">Nog geen documenten toegevoegd.</td></tr>';
            return;
          }
          if(warn) warn.style.display='none';

          rows.innerHTML = items.map((d, idx)=>`
            <tr data-idx="${idx}">
              <td>${UI.esc(d.kind||'overig')}</td>
              <td>${UI.esc(d.name||'')}</td>
              <td>${UI.esc(d.size||'')}</td>
              <td>${UI.esc(d.addedAt||'')}</td>
              <td><button class="btn btn-sm" data-act="rm" data-idx="${idx}">Verwijder</button></td>
            </tr>
          `).join('');

          rows.querySelectorAll('button[data-act="rm"]').forEach(b=>{
            b.onclick = async ()=>{
              const idx = parseInt(b.getAttribute('data-idx'),10);
              if(!confirm('Document verwijderen?')) return;
              window.wiz.docs.splice(idx,1);
              render();
            };
          });
        }

        async function upload(){
          const files = fileInp?.files ? Array.from(fileInp.files) : [];
          if(!files.length){ UI.toast('Geen bestanden gekozen'); return; }
          const kind = (kindSel?.value||'overig');

          // API upload alleen als beschikbaar (anders: concept metadata)
          const canApi = isLoggedIn() && window.Auth?.attachments && _has(window.Auth.attachments.upload);
          if(canApi){
            const created = await ensureCreated();
            const projectId = created.id;
            for(const f of files){
              await _apiTry(()=> window.Auth.attachments.upload({ scope_type:'project', scope_id:projectId, kind, file:f }), ()=>null);
            }
            UI.toast('Upload (API) voltooid');
          }else{
            for(const f of files){
              window.wiz.docs.push({
                kind,
                name: f.name,
                size: (f.size||0) ? Math.round(f.size/1024)+' KB' : '',
                addedAt: new Date().toLocaleString('nl-NL')
              });
            }
            UI.toast('Documenten toegevoegd (concept)');
          }
          if(fileInp) fileInp.value='';
          render();
        }

        if(btnUp) btnUp.onclick = upload;
        if(btnRef) btnRef.onclick = render;

        render();
      }

      // --- Step 8: Checklist ---
      function ensureChecklist(){
        if(wiz.checklist && wiz.checklist.length) return;
        wiz.checklist = [
          { group:'Voorbereiding', text:'Projectgegevens compleet', applicable:true, approved:false, note:'' },
          { group:'Materiaal', text:'Materiaalcertificaten aanwezig', applicable:true, approved:false, note:'' },
          { group:'Uitvoering', text:'WPS/WPQR gekoppeld', applicable:true, approved:false, note:'' },
          { group:'NDT', text:'NDO plan vastgelegd', applicable:true, approved:false, note:'' },
          { group:'Documentatie', text:'Documenten geüpload', applicable:true, approved:false, note:'' },
        ];
      }

      function isChecklistConform(){
        ensureChecklist();
        return wiz.checklist.every(it => !it.applicable || !!it.approved);
      }

      async function mountChecklistStep(){
        ensureChecklist();
        const rows = document.getElementById('wiz_chk_rows');
        const warn = document.getElementById('wiz_chk_warn');

        function render(){
          if(!rows) return;
          rows.innerHTML = wiz.checklist.map((it, idx)=>`
            <tr data-idx="${idx}" style="cursor:pointer">
              <td>${UI.esc(it.group)}</td>
              <td>${UI.esc(it.text)}</td>
              <td>${it.applicable ? 'Ja' : 'Nee'}</td>
              <td>${it.approved ? 'Ja' : 'Nee'}</td>
              <td>${UI.esc(it.note||'')}</td>
            </tr>
          `).join('');

          rows.querySelectorAll('tr[data-idx]').forEach(tr=>{
            tr.onclick = ()=>{
              const idx = parseInt(tr.getAttribute('data-idx'),10);
              openChecklistItem(idx);
            };
          });

          if(warn) warn.style.display = isChecklistConform() ? 'none' : 'inline-flex';
        }

        function openChecklistItem(idx){
          const it = wiz.checklist[idx];
          const html = `
            <div style="font-weight:900; margin-bottom:6px">Controlepunt wijzigen</div>
            <div class="smallmuted" style="margin-bottom:10px">${UI.esc(it.group)} — ${UI.esc(it.text)}</div>
            <div style="display:grid; grid-template-columns:200px 1fr; gap:10px; align-items:center">
              <div class="smallmuted" style="font-weight:800">Van toepassing</div>
              <label style="display:flex; gap:8px; align-items:center">
                <input type="checkbox" id="chk_app" ${it.applicable?'checked':''} />
                <span>Ja</span>
              </label>

              <div class="smallmuted" style="font-weight:800">Goedgekeurd</div>
              <label style="display:flex; gap:8px; align-items:center">
                <input type="checkbox" id="chk_ok" ${it.approved?'checked':''} />
                <span>Ja</span>
              </label>

              <div class="smallmuted" style="font-weight:800">Opmerking</div>
              <textarea class="input" id="chk_note" rows="3" placeholder="Opmerking">${UI.esc(it.note||'')}</textarea>
            </div>
            <div style="display:flex; justify-content:flex-end; gap:8px; margin-top:14px">
              <button class="btn" id="chk_cancel">Annuleren</button>
              <button class="btn primary" id="chk_save">Opslaan</button>
            </div>
          `;
          UI.openModal({
            title:'Checklist item',
            saveLabel:'Sluiten',
            bodyHtml: html,
            onSave: ({close})=>close(),
            onMount: ({close})=>{
              document.getElementById('chk_cancel').onclick = close;
              document.getElementById('chk_save').onclick = ()=>{
                it.applicable = !!document.getElementById('chk_app').checked;
                it.approved = !!document.getElementById('chk_ok').checked;
                it.note = (document.getElementById('chk_note').value||'').trim();
                close();
                render();
              };
            }
          });
        }

        // bulk actions
        const btnOff = document.getElementById('wiz_chk_all_off');
        const btnOn = document.getElementById('wiz_chk_all_on');
        const btnReset = document.getElementById('wiz_chk_reset');
        if(btnOff) btnOff.onclick = ()=>{ wiz.checklist.forEach(it=>{ it.applicable=false; it.approved=false; }); render(); };
        if(btnOn) btnOn.onclick = ()=>{ wiz.checklist.forEach(it=>{ it.applicable=true; it.approved=true; }); render(); };
        if(btnReset) btnReset.onclick = ()=>{ wiz.checklist = []; ensureChecklist(); render(); };

        render();
      }

      // --- Step 9: Report ---
      async function mountReportStep(){
        const el = document.getElementById('wiz_rep_summary');
        function summary(){
          const p = wiz.project || {};
          const lines = [];
          lines.push(`<b>${UI.esc((p.nummer||'')+' — '+(p.naam||''))}</b>`);
          lines.push(`Opdrachtgever: ${UI.esc(p.opdrachtgever||'—')}`);
          lines.push(`Lassen: <b>${(wiz.welds||[]).length}</b>`);
          lines.push(`WPS/WPQR: <b>${(_ensureArray('wps').length)}</b>`);
          lines.push(`Materialen: <b>${(_ensureArray('materials').length)}</b>`);
          lines.push(`Lassers: <b>${(_ensureArray('welders').length)}</b>`);
          lines.push(`Documenten: <b>${(_ensureArray('docs').length)}</b>`);
          lines.push(`Checklist conform: <b>${isChecklistConform() ? 'Ja' : 'Nee'}</b>`);
          return lines.join('<br/>');
        }
        if(el) el.innerHTML = summary();

        const btnDl = document.getElementById('wiz_rep_download');
        const btnPr = document.getElementById('wiz_rep_print');
        const btnGo = document.getElementById('wiz_rep_go_las');

        if(btnDl) btnDl.onclick = ()=>{
          const data = {
            project: wiz.project,
            welds: wiz.welds,
            wps: _ensureArray('wps'),
            ndo_plan: wiz.ndo_plan || null,
            materials: _ensureArray('materials'),
            welders: _ensureArray('welders'),
            docs: _ensureArray('docs'),
            checklist: wiz.checklist || []
          };
          const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = (wiz.project?.nummer || 'project') + '_wizard_rapport.json';
          document.body.appendChild(a);
          a.click();
          a.remove();
          setTimeout(()=>URL.revokeObjectURL(url), 1000);
        };

        if(btnPr) btnPr.onclick = ()=> window.print();

        if(btnGo) btnGo.onclick = ()=>{
          modal.close();
          location.href = 'lascontrole.html';
        };
      }


      async function mountNormStep(){
        await ensureAdminChecked();
        // Disable/enable replace option dynamically without rerender
        const replaceRadio = document.querySelector('input[name="wiz_tpl_mode"][value="replace"]');
        if(replaceRadio) replaceRadio.disabled = !wiz.isAdmin;

        const excSel = document.getElementById('wiz_p_exc');
        if(excSel){
          excSel.onchange = async ()=>{
            wiz.project.exc = excSel.value;
            await refreshTemplatePreview();
          };
        }
        await refreshTemplatePreview();
      }

      async function ensureCreated(){
        if(wiz.created.id) return wiz.created;
        // validate
        if(!wiz.project.nummer || !wiz.project.nummer.trim()) throw new Error('Projectnummer verplicht');

        // Create via API when logged in, otherwise local fallback
        if(isLoggedIn()){
          const saved = await window.Auth.projects.create(localToApi(wiz.project));
          wiz.created = { id: saved.id, api:true };
          // refresh store
          await syncProjectsFromApi();
          return wiz.created;
        }

        // local offline
        const p = { id: wiz.project.nummer.trim(), nummer:wiz.project.nummer.trim(), naam:wiz.project.naam||"", opdrachtgever:wiz.project.opdrachtgever||"", exc:wiz.project.exc||"EXC2", acceptatieklasse:wiz.project.acceptatieklasse||"B", status:'in_controle', locked:false };
        window.CWS.upsertProject(p);
        wiz.created = { id: p.id, api:false };
        return wiz.created;
      }

      async function applyTemplateIfNeeded(projectId){
        if(!isLoggedIn()) return;
        if(wiz.applyTemplateMode==='skip') return;
        const mode = wiz.applyTemplateMode==='replace' ? 'replace' : 'merge';

        // replace = admin only guard
        if(mode==='replace'){
          try{
            const me = await window.Auth.me();
            const isAdmin = !!(me && (me.is_tenant_admin || me.is_platform_admin || me.role==='Admin'));
            if(!isAdmin){ UI.toast('Vervangen is alleen voor admin. Gebruik merge.'); return; }
          }catch(_){ UI.toast('Admin check mislukt, replace overgeslagen.'); return; }
        }

        const list = await window.Auth.phase1.listInspectionTemplates(wiz.project.exc);
        if(!list || !list.length){ UI.toast('Geen inspectie-template gevonden voor '+wiz.project.exc); return; }
        const tpl = list.find(t=>t.is_default) || list[0];
        await window.Auth.phase1.applyInspectionTemplate(projectId, { template_id: tpl.id, mode });
      }

      async function bulkAddIfNeeded(projectId){
        if(!isLoggedIn()) return;
        let counts = {wps_added:0, materials_added:0, welders_added:0};
        if(wiz.bulkAdd.wps && wiz.bulkAdd.materials && wiz.bulkAdd.welders){
          const r = await window.Auth.phase1.addAllLascontrole(projectId);
          counts = r || counts;
        } else {
          if(wiz.bulkAdd.wps){ const r = await window.Auth.phase1.addAllWps(projectId); counts.wps_added += (r?.wps_added||0); }
          if(wiz.bulkAdd.materials){ const r = await window.Auth.phase1.addAllMaterials(projectId); counts.materials_added += (r?.materials_added||0); }
          if(wiz.bulkAdd.welders){ const r = await window.Auth.phase1.addAllWelders(projectId); counts.welders_added += (r?.welders_added||0); }
        }
        UI.toast(`Toegevoegd: WPS ${counts.wps_added||0}, Materialen ${counts.materials_added||0}, Lassers ${counts.welders_added||0}`);
      }

      async function next(){
        try{
          steps[wiz.idx].apply?.();

          // Validaties per stap (Optie B: echt, maar zonder harde blokkades waar niet nodig)
          if(wiz.idx===0){
            const num=(wiz.project.nummer||'').trim();
            const naam=(wiz.project.naam||'').trim();
            if(!num || num==='P-'){ throw new Error('Vul een geldig projectnummer in.'); }
            if(!naam){ throw new Error('Vul een projectnaam in.'); }
            await ensureCreated(); // nodig voor alle vervolgstappen
            updateBadges();
          }

          if(wiz.idx===1){
            if((wiz.welds||[]).length===0){
              try{ UI.toast('Let op: je hebt nog geen lassen toegevoegd.'); }catch(_){}
            }
          }

          if(wiz.idx===3){
            // NDO soft warning als vereist maar onvolledig
            const ndo = wiz.ndo_plan || {};
            if(ndo.required && (!ndo.method || (!ndo.percent && !ndo.count))){
              try{ UI.toast('Let op: NDO vereist, maar methode/omvang ontbreekt.'); }catch(_){}
            }
          }

          if(wiz.idx===7){
            // Checklist warning als niet conform
            if(!isChecklistConform()){
              try{ UI.toast('Let op: checklist is nog niet volledig conform.'); }catch(_){}
            }
          }

          if(wiz.idx>=steps.length-1){
            const created = await ensureCreated();
            const st2 = window.CWS.getState();
            st2.ui.activeProjectId = created.id;
            window.CWS.setState(st2);
            UI.toast('Wizard afgerond.');
            modal.close();
            location.href = 'lascontrole.html';
            return;
          }

          wiz.idx++;
          document.getElementById('uiModalBody').innerHTML = body();
          wire();
          updateBadges();
        }catch(e){
          console.error(e);
          UI.toast(e && e.message ? e.message : 'Wizard stap mislukt');
        }
      }


      function back(){
        steps[wiz.idx].apply?.();
        wiz.idx = Math.max(0, wiz.idx-1);
        document.getElementById('uiModalBody').innerHTML = body();
        wire();
      }


      function updateBadges(){
        try{
          const pnum = (wiz.project.nummer||'').trim();
          const pnaam = (wiz.project.naam||'').trim();
          const ptitle = (pnum||'Nieuw project') + (pnaam?(' — '+pnaam):'');
          const pclient = (wiz.project.opdrachtgever||'').trim();
          const exc = wiz.project.exc || '';
          const acc = wiz.project.acceptatieklasse || '';
          const status = wiz.project.status || 'in_controle';

          const elProj = document.getElementById('wizBadgeProject'); if(elProj) elProj.innerHTML = '<b>'+UI.esc(ptitle)+'</b>';
          const elCli = document.getElementById('wizBadgeClient'); if(elCli) elCli.textContent = 'Opdrachtgever: ' + (pclient||'—');
          const elExc = document.getElementById('wizBadgeExc'); if(elExc) elExc.textContent = 'EXC: ' + (exc||'—');
          const elAcc = document.getElementById('wizBadgeAcc'); if(elAcc) elAcc.textContent = 'Acceptatie: ' + (acc||'—');
          const elSt = document.getElementById('wizBadgeStatus'); if(elSt) elSt.textContent = 'Status: ' + (status||'in_controle');
          const elStep = document.getElementById('wizBadgeStep'); if(elStep) elStep.textContent = `Stap ${wiz.idx+1} / ${steps.length}`;
        }catch(_){ }
      }

      async function saveDraft(){
        try{
          steps[wiz.idx].apply?.();
          await ensureCreated();
          updateBadges();
          UI.toast('Concept opgeslagen.');
        }catch(e){
          console.error(e);
          UI.toast(e && e.message ? e.message : 'Opslaan concept mislukt');
        }
      }

      function wire(){
        const b = document.getElementById('wizBack');
        const n = document.getElementById('wizNext');
        const s = document.getElementById('wizSaveDraft');
        if(b) b.onclick = back;
        if(n) n.onclick = next;
        if(s) s.onclick = saveDraft;

        // Live badge updates (no flakes, no timeouts)
        if(wiz.idx===0){
          const iNum = document.getElementById('wiz_p_nummer');
          const iNaam = document.getElementById('wiz_p_naam');
          const iCli = document.getElementById('wiz_p_client');
          if(iNum) iNum.oninput = ()=>{ wiz.project.nummer = iNum.value; updateBadges(); };
          if(iNaam) iNaam.oninput = ()=>{ wiz.project.naam = iNaam.value; updateBadges(); };
          if(iCli) iCli.oninput = ()=>{ wiz.project.opdrachtgever = iCli.value; updateBadges(); };
        }
        if(wiz.idx===2){
          const excSel = document.getElementById('wiz_p_exc');
          const accSel = document.getElementById('wiz_p_acc');
          if(excSel) excSel.onchange = ()=>{ wiz.project.exc = excSel.value; updateBadges(); };
          if(accSel) accSel.onchange = ()=>{ wiz.project.acceptatieklasse = accSel.value; updateBadges(); };
        }
        if(wiz.idx===1){ mountWeldsStep(); }
        if(wiz.idx===2){ mountWpsStep(); }
        if(wiz.idx===3){ mountNdoStep(); }
        if(wiz.idx===4){ mountMaterialsStep(); }
        if(wiz.idx===5){ mountWeldersStep(); }
        if(wiz.idx===6){ mountDocsStep(); }
        if(wiz.idx===7){ mountChecklistStep(); }
        if(wiz.idx===8){ mountReportStep(); }

        updateBadges();
      }
      wire();
    }

    // Backwards-compat: als er elders nog een knop bestaat, koppel 'm veilig.
    const btnWizard = document.getElementById("btnWizard");
    if(btnWizard){ btnWizard.addEventListener("click", openProjectWizard); }

    // Hoofdmenu → Nieuw project wizard
    if(String(location.hash||'')==="#wizard-nieuw-project"){
      // Wacht op app ready (stabiliteit) en open daarna.
      if(document.body && document.body.dataset && document.body.dataset.appReady==="1") openProjectWizard();
      else window.addEventListener('cws-app-ready', ()=>openProjectWizard(), {once:true});
    }
    document.getElementById("btnCols").addEventListener("click", ()=>{
      UI.columnManager({title:"Kolommen (Projecten)", columns: COLS.filter(c=>c.key!=="actie"), stateKey:"projectenCols", onApply: ()=>render()});
    });

    document.getElementById("btnExport").addEventListener("click", ()=>{
      const list = filteredProjects();
      const rows = [["Projectnummer","Projectnaam","Opdrachtgever","EXC","Acceptatie","Status","Laatst gewijzigd"]];
      list.forEach(p=>rows.push([p.nummer,p.naam,p.opdrachtgever,p.exc,p.acceptatieklasse,p.status,p.laatstGewijzigd]));
      window.parent?.Export?.csv?.("projecten.csv", rows);
      UI.toast("Export gestart.");
    });

    // Initial load: try to sync from API (if logged in), then render.
    (async ()=>{
      await syncProjectsFromApi();
      render();
    })();

    // When the shell seeds demo or clears data in the backend, reload projects.
    window.addEventListener('cws_projects_changed', async ()=>{
      await syncProjectsFromApi();
      render();
    });
  </script>
</body>
</html>
