<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Projecten</title>
  <script>window.__API_BASE_URL__ = window.__API_BASE_URL__ || localStorage.getItem("API_BASE_URL") || "/api";</script>
  <link rel="stylesheet" href="../css/theme.css" />
<meta name="theme-color" content="#0c1830" />
  <style>
    .page-wrap{padding:18px 18px 28px;}
    .toolbar{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:12px;flex-wrap:wrap;}
    .toolbar-left,.toolbar-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
    .search{min-width:220px;max-width:320px;width:100%;}
    .small-muted{font-size:12px;color:#64748b;}
    .empty-row td{color:#64748b;}
    .actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
    .badge-status{display:inline-flex;align-items:center;justify-content:center;padding:6px 12px;border-radius:999px;font-size:12px;font-weight:700;color:#fff;min-width:96px;}
    .badge-status.in-controle{background:#2563eb;}
    .badge-status.conform{background:#16a34a;}
    .badge-status.afgekeurd{background:#dc2626;}
    .badge-status.locked{background:#111827;}
    .status-filters{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0 14px;}
    .status-filters .btn.active{box-shadow:inset 0 0 0 1px rgba(15,23,42,.14);font-weight:700;}
    .table-wrap{overflow:auto;}
    .info-line{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-top:8px;font-size:12px;color:#64748b;}
    .hidden{display:none !important;}
  </style>
</head>
<body data-title="Projecten">
  <main class="page-wrap">
    <section class="card pad">
      <div class="toolbar">
        <div class="toolbar-left">
          <input id="projectSearch" class="input search" type="search" placeholder="Zoek project (fuzzy)" />
          <button id="btnNieuw" class="btn">Nieuw</button>
          <button id="btnExport" class="btn">Export</button>
          <button id="btnKolommen" class="btn">Kolommen</button>
        </div>
        <div class="toolbar-right small-muted">
          Dubbelklik rij → bewerken • Rechtsklik rij → menu
        </div>
      </div>

      <div class="status-filters">
        <button class="btn active" data-filter="all">Alle projecten</button>
        <button class="btn" data-filter="in_controle">In controle</button>
        <button class="btn" data-filter="conform">Conform</button>
        <button class="btn" data-filter="afgekeurd">Afgekeurd</button>
        <button class="btn" data-filter="locked">Locked</button>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Projectnummer</th>
              <th>Projectnaam</th>
              <th>Opdrachtgever</th>
              <th>Executieklasse</th>
              <th>Acceptatieklasse</th>
              <th>Status</th>
              <th>Laatst gewijzigd</th>
              <th>Actie</th>
            </tr>
          </thead>
          <tbody id="projectsTbody">
            <tr class="empty-row"><td colspan="8">Projecten worden geladen…</td></tr>
          </tbody>
        </table>
      </div>

      <div class="info-line">
        <div id="projectsCount">0 projecten</div>
        <div>
          <button class="btn" type="button" disabled aria-label="Vorige pagina">‹</button>
          <span style="padding:0 8px;">1</span>
          <button class="btn" type="button" disabled aria-label="Volgende pagina">›</button>
        </div>
      </div>
    </section>
  </main>

  <script src="../js/core/store.js"></script>
  <script src="../js/core/permissions.js"></script>
  <script src="../js/core/ui.js"></script>
  <script src="../js/core/apps_menu.js"></script>
  <script src="../js/core/export.js"></script>
  <script src="../js/core/auth_client.js"></script>
  <script src="../js/core/pwa.js"></script>
  <script src="../js/core/shell.js"></script>
  <script>
    (function(){
      const state = {
        allProjects: [],
        filteredProjects: [],
        filter: 'all',
        search: ''
      };

      function esc(v){
        return String(v ?? '')
          .replaceAll('&','&amp;')
          .replaceAll('<','&lt;')
          .replaceAll('>','&gt;')
          .replaceAll('"','&quot;')
          .replaceAll("'", '&#039;');
      }

      function getToken(){
        return localStorage.getItem('nen1090.auth.access') || localStorage.getItem('auth_token') || '';
      }

      function getApiBaseUrl(){
        const base = localStorage.getItem('nen1090.api.baseUrl') || localStorage.getItem('API_BASE_URL') || '';
        return String(base || '').replace(/\/+$/,'');
      }

      async function apiFetch(path, options){
        const token = getToken();
        const baseUrl = getApiBaseUrl();
        if(!baseUrl){
          throw new Error('API Base URL ontbreekt. Stel deze in via Instellingen of set_api.');
        }
        const headers = new Headers((options && options.headers) || {});
        headers.set('Accept', 'application/json');
        if(token){
          headers.set('Authorization', 'Bearer ' + token);
        }
        if(options && options.body && !headers.has('Content-Type')){
          headers.set('Content-Type', 'application/json');
        }
        const res = await fetch(baseUrl + path, Object.assign({}, options || {}, { headers }));
        let json = null;
        let text = '';
        const ct = res.headers.get('content-type') || '';
        if(ct.includes('application/json')){
          json = await res.json().catch(()=>null);
        } else {
          text = await res.text().catch(()=>'');
        }
        if(!res.ok){
          const detail = (json && (json.detail || json.message)) || text || ('HTTP ' + res.status);
          const err = new Error(detail);
          err.status = res.status;
          err.payload = json;
          throw err;
        }
        return json;
      }

      function formatDate(v){
        if(!v) return '';
        const d = new Date(v);
        if(Number.isNaN(d.getTime())) return String(v);
        const yy = d.getFullYear();
        const mm = String(d.getMonth()+1).padStart(2,'0');
        const dd = String(d.getDate()).padStart(2,'0');
        const hh = String(d.getHours()).padStart(2,'0');
        const mi = String(d.getMinutes()).padStart(2,'0');
        return `${yy}-${mm}-${dd} ${hh}:${mi}`;
      }

      function mapStatusLabel(v){
        const s = String(v || '').toLowerCase();
        if(s === 'in_controle') return 'In controle';
        if(s === 'conform') return 'Conform';
        if(s === 'afgekeurd') return 'Afgekeurd';
        if(s === 'locked') return 'Locked';
        return v || '';
      }

      function mapStatusClass(v){
        const s = String(v || '').toLowerCase();
        if(s === 'in_controle') return 'in-controle';
        if(s === 'conform') return 'conform';
        if(s === 'afgekeurd') return 'afgekeurd';
        if(s === 'locked') return 'locked';
        return 'in-controle';
      }

      function toFrontendProject(project){
        return {
          id: project.id,
          nummer: project.code || '',
          naam: project.name || '',
          opdrachtgever: project.client_name || '',
          executieklasse: project.execution_class || '',
          acceptatieklasse: project.acceptance_class || '',
          status: project.locked ? 'locked' : (project.status || 'in_controle'),
          locked: !!project.locked,
          laatstGewijzigd: project.updated_at || project.created_at || ''
        };
      }

      function syncProjectsIntoCwsStore(projects){
        try{
          if(!window.CWS || !window.CWS.getState || !window.CWS.setState) return;
          const st = window.CWS.getState();
          const oldActiveId = st.ui.activeProjectId || '';
          const oldActiveCode = oldActiveId && st.projects.byId[oldActiveId] ? st.projects.byId[oldActiveId].nummer : '';
          st.projects.byId = {};
          st.projects.order = [];
          projects.forEach((p)=>{
            st.projects.byId[p.id] = {
              id: p.id,
              nummer: p.nummer,
              naam: p.naam,
              opdrachtgever: p.opdrachtgever,
              exc: p.executieklasse,
              acceptatieklasse: p.acceptatieklasse,
              status: p.status,
              locked: p.locked,
              laatstGewijzigd: p.laatstGewijzigd
            };
            st.projects.order.push(p.id);
          });
          if(oldActiveCode){
            const match = st.projects.order.find((id)=> (st.projects.byId[id]?.nummer || '') === oldActiveCode);
            if(match) st.ui.activeProjectId = match;
          }
          if(!st.ui.activeProjectId && st.projects.order.length){
            st.ui.activeProjectId = st.projects.order[0];
          }
          window.CWS.setState(st);
          try{ window.dispatchEvent(new Event('cws_projects_changed')); }catch(_){ }
        }catch(err){
          console.error('Sync CWS store mislukt:', err);
        }
      }

      function getVisibleProjects(){
        const q = state.search.trim().toLowerCase();
        return state.allProjects.filter((p)=>{
          if(state.filter === 'locked' && !p.locked) return false;
          if(state.filter !== 'all' && state.filter !== 'locked' && p.status !== state.filter) return false;
          if(!q) return true;
          const hay = [p.nummer, p.naam, p.opdrachtgever, p.executieklasse, p.acceptatieklasse, p.status].join(' ').toLowerCase();
          return hay.includes(q);
        });
      }

      function render(){
        const tbody = document.getElementById('projectsTbody');
        const countEl = document.getElementById('projectsCount');
        state.filteredProjects = getVisibleProjects();
        countEl.textContent = `${state.filteredProjects.length} projecten`;

        if(!state.filteredProjects.length){
          tbody.innerHTML = '<tr class="empty-row"><td colspan="8">0 projecten</td></tr>';
          return;
        }

        tbody.innerHTML = state.filteredProjects.map((p)=>`
          <tr data-project-id="${esc(p.id)}">
            <td>${esc(p.nummer)}</td>
            <td>${esc(p.naam)}</td>
            <td>${esc(p.opdrachtgever)}</td>
            <td>${esc(p.executieklasse)}</td>
            <td>${esc(p.acceptatieklasse)}</td>
            <td><span class="badge-status ${esc(mapStatusClass(p.status))}">${esc(mapStatusLabel(p.status))}</span></td>
            <td>${esc(formatDate(p.laatstGewijzigd))}</td>
            <td>
              <div class="actions">
                <button class="btn btn-edit" data-action="edit" data-id="${esc(p.id)}">Edit</button>
                <button class="btn btn-delete" data-action="delete" data-id="${esc(p.id)}">Verwijderen</button>
              </div>
            </td>
          </tr>
        `).join('');
      }

      async function loadProjects(){
        const tbody = document.getElementById('projectsTbody');
        if(!getToken()){
          state.allProjects = [];
          syncProjectsIntoCwsStore([]);
          render();
          return;
        }
        tbody.innerHTML = '<tr class="empty-row"><td colspan="8">Projecten worden geladen…</td></tr>';
        try{
          const json = await apiFetch('/api/v1/projects', { method: 'GET' });
          state.allProjects = (Array.isArray(json) ? json : []).map(toFrontendProject);
          syncProjectsIntoCwsStore(state.allProjects);
          render();
        }catch(err){
          console.error('Laden projecten mislukt:', err);
          if(err && (err.status === 401 || err.status === 403)){
            try{
              localStorage.removeItem('auth_token');
              localStorage.removeItem('nen1090.auth.access');
              localStorage.removeItem('nen1090.auth.refresh');
              localStorage.removeItem('nen1090.auth.email');
              localStorage.removeItem('nen1090.auth.tenant');
              window.dispatchEvent(new Event('auth-changed'));
            }catch(_){ }
          }
          state.allProjects = [];
          syncProjectsIntoCwsStore([]);
          tbody.innerHTML = `<tr class="empty-row"><td colspan="8">Laden van projecten mislukt: ${esc(err.message || 'onbekende fout')}</td></tr>`;
          document.getElementById('projectsCount').textContent = '0 projecten';
        }
      }

      function projectToFormValues(project){
        return {
          code: project ? (project.nummer || '') : '',
          name: project ? (project.naam || '') : '',
          client_name: project ? (project.opdrachtgever || '') : '',
          execution_class: project ? (project.executieklasse || '') : 'EXC2',
          acceptance_class: project ? (project.acceptatieklasse || '') : 'B',
          status: project ? ((project.locked ? 'locked' : project.status) || 'in_controle') : 'in_controle',
          locked: project ? !!project.locked : false,
          start_date: '',
          end_date: ''
        };
      }

      function openProjectModal(project){
        const editMode = !!project;
        const values = projectToFormValues(project);

        if(window.UI && typeof window.UI.modalForm === 'function'){
          window.UI.modalForm({
            title: editMode ? 'Project bewerken' : 'Nieuw project',
            submitLabel: editMode ? 'Opslaan' : 'Aanmaken',
            values,
            fields: [
              { key:'code', label:'Projectnummer', type:'text' },
              { key:'name', label:'Projectnaam', type:'text' },
              { key:'client_name', label:'Opdrachtgever', type:'text' },
              { key:'execution_class', label:'Executieklasse', type:'select', options:[['EXC1','EXC1'],['EXC2','EXC2'],['EXC3','EXC3'],['EXC4','EXC4']] },
              { key:'acceptance_class', label:'Acceptatieklasse', type:'select', options:[['A','A'],['B','B'],['C','C'],['D','D']] },
              { key:'status', label:'Status', type:'select', options:[['in_controle','In controle'],['conform','Conform'],['afgekeurd','Afgekeurd']] },
              { key:'locked', label:'Locked', type:'checkbox' },
              { key:'start_date', label:'Startdatum', type:'date' },
              { key:'end_date', label:'Einddatum', type:'date' }
            ],
            onSubmit: async (vals)=>{
              await saveProject(project, vals);
              return true;
            }
          });
          return;
        }

        const fallback = {
          code: prompt('Projectnummer', values.code) ?? values.code,
          name: prompt('Projectnaam', values.name) ?? values.name,
          client_name: prompt('Opdrachtgever', values.client_name) ?? values.client_name,
          execution_class: prompt('Executieklasse (EXC1/EXC2/EXC3/EXC4)', values.execution_class) ?? values.execution_class,
          acceptance_class: prompt('Acceptatieklasse (A/B/C/D)', values.acceptance_class) ?? values.acceptance_class,
          status: prompt('Status (in_controle/conform/afgekeurd)', values.status) ?? values.status,
          locked: confirm('Project locked? OK = ja, Annuleren = nee'),
          start_date: '',
          end_date: ''
        };
        saveProject(project, fallback).catch((err)=>{
          alert('Opslaan mislukt: ' + (err.message || err));
        });
      }

      async function saveProject(existingProject, vals){
        const payload = {
          code: String(vals.code || '').trim() || null,
          name: String(vals.name || '').trim(),
          client_name: String(vals.client_name || '').trim() || null,
          execution_class: String(vals.execution_class || '').trim() || null,
          acceptance_class: String(vals.acceptance_class || '').trim() || null,
          status: String(vals.status || 'in_controle').trim() || 'in_controle',
          locked: !!vals.locked,
          start_date: vals.start_date ? String(vals.start_date) : null,
          end_date: vals.end_date ? String(vals.end_date) : null
        };

        if(!payload.name){
          throw new Error('Projectnaam is verplicht.');
        }

        if(existingProject){
          await apiFetch('/api/v1/projects/' + encodeURIComponent(existingProject.id), {
            method: 'PUT',
            body: JSON.stringify(payload)
          });
          if(window.UI && window.UI.toast) window.UI.toast('Project opgeslagen');
        } else {
          await apiFetch('/api/v1/projects', {
            method: 'POST',
            body: JSON.stringify(payload)
          });
          if(window.UI && window.UI.toast) window.UI.toast('Project aangemaakt');
        }
        await loadProjects();
      }

      async function deleteProject(project){
        const ok = confirm(`Project verwijderen?\n\n${project.nummer} — ${project.naam}`);
        if(!ok) return;
        await apiFetch('/api/v1/projects/' + encodeURIComponent(project.id), {
          method: 'DELETE'
        });
        if(window.UI && window.UI.toast) window.UI.toast('Project verwijderd');
        await loadProjects();
      }

      function bindEvents(){
        document.getElementById('projectSearch').addEventListener('input', (e)=>{
          state.search = e.target.value || '';
          render();
        });

        document.querySelectorAll('[data-filter]').forEach((btn)=>{
          btn.addEventListener('click', ()=>{
            document.querySelectorAll('[data-filter]').forEach((x)=>x.classList.remove('active'));
            btn.classList.add('active');
            state.filter = btn.getAttribute('data-filter') || 'all';
            render();
          });
        });

        document.getElementById('btnNieuw').addEventListener('click', ()=>{
          if(!getToken()){
            if(window.UI && window.UI.toast) window.UI.toast('Log eerst in.');
            return;
          }
          openProjectModal(null);
        });

        document.getElementById('btnExport').addEventListener('click', ()=>{
          const rows = state.filteredProjects.length ? state.filteredProjects : state.allProjects;
          const csv = [
            ['Projectnummer','Projectnaam','Opdrachtgever','Executieklasse','Acceptatieklasse','Status','Laatst gewijzigd'].join(';')
          ].concat(rows.map((p)=>[
            p.nummer,
            p.naam,
            p.opdrachtgever,
            p.executieklasse,
            p.acceptatieklasse,
            mapStatusLabel(p.status),
            formatDate(p.laatstGewijzigd)
          ].map((v)=>`"${String(v ?? '').replaceAll('"','""')}"`).join(';'))).join('\n');
          const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = 'projecten_export.csv';
          document.body.appendChild(a);
          a.click();
          a.remove();
          URL.revokeObjectURL(url);
        });

        document.getElementById('btnKolommen').addEventListener('click', ()=>{
          if(window.UI && window.UI.toast) window.UI.toast('Kolommenbeheer volgt later.');
        });

        document.getElementById('projectsTbody').addEventListener('click', async (e)=>{
          const btn = e.target.closest('[data-action]');
          if(!btn) return;
          const id = btn.getAttribute('data-id');
          const project = state.allProjects.find((p)=>p.id === id);
          if(!project) return;
          const action = btn.getAttribute('data-action');
          try{
            if(action === 'edit'){
              openProjectModal(project);
            } else if(action === 'delete'){
              await deleteProject(project);
            }
          }catch(err){
            console.error(err);
            if(window.UI && window.UI.toast) window.UI.toast(err.message || 'Actie mislukt');
          }
        });

        document.getElementById('projectsTbody').addEventListener('dblclick', (e)=>{
          const row = e.target.closest('tr[data-project-id]');
          if(!row) return;
          const project = state.allProjects.find((p)=>p.id === row.getAttribute('data-project-id'));
          if(project) openProjectModal(project);
        });

        document.getElementById('projectsTbody').addEventListener('contextmenu', (e)=>{
          const row = e.target.closest('tr[data-project-id]');
          if(!row) return;
          e.preventDefault();
          const project = state.allProjects.find((p)=>p.id === row.getAttribute('data-project-id'));
          if(!project) return;
          const choice = prompt(`Menu voor ${project.nummer}\nTyp: edit of delete`, 'edit');
          if(choice === 'delete'){
            deleteProject(project).catch((err)=>{
              console.error(err);
              if(window.UI && window.UI.toast) window.UI.toast(err.message || 'Verwijderen mislukt');
            });
          } else if(choice === 'edit'){
            openProjectModal(project);
          }
        });

        window.addEventListener('auth-changed', ()=>{
          loadProjects();
        });
      }

      function boot(){
        if(window.Shell && typeof window.Shell.mount === 'function'){
          window.Shell.mount();
        }
        bindEvents();
        loadProjects();
      }

      if(document.readyState === 'loading'){
        document.addEventListener('DOMContentLoaded', boot);
      } else {
        boot();
      }
    })();
  </script>
</body>
</html>
