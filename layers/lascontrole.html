  <script>
    Shell.mount();

    // ===== Offline-first: queue critical writes when offline (Lascontrole) =====
    (function initOfflineQueue(){
      try{
        if(!window.OfflineQueue || !window.Auth || !window.Auth.inspections) return;

        const origUpsert = window.Auth.inspections.upsertForWeld;
        const origReset = window.Auth.inspections.resetToNormForWeld;

        window.Auth.inspections.upsertForWeld = async function(weldUuid, payload){
          try{
            return await origUpsert(weldUuid, payload);
          }catch(e){
            if(window.OfflineQueue.isOfflineError(e)){
              await window.OfflineQueue.enqueue('inspection_upsert', { weldUuid, payload });
              try{ UI.toast('Offline opgeslagen: inspectie wordt automatisch gesynchroniseerd.'); }catch(_){ }
              return { offline:true };
            }
            throw e;
          }
        };

        window.Auth.inspections.resetToNormForWeld = async function(weldUuid, payload){
          try{
            return await origReset(weldUuid, payload || {});
          }catch(e){
            if(window.OfflineQueue.isOfflineError(e)){
              await window.OfflineQueue.enqueue('inspection_reset_to_norm', { weldUuid, payload: payload || {} });
              try{ UI.toast('Offline opgeslagen: reset wordt automatisch gesynchroniseerd.'); }catch(_){ }
              return { offline:true };
            }
            throw e;
          }
        };

        async function flushNow(){
          try{
            const res = await window.OfflineQueue.flush();
            if(res && res.ok && (res.done||0) > 0){
              try{ UI.toast(`Gesynchroniseerd: ${res.done} offline acties`); }catch(_){ }
            }
          }catch(_){ }
        }

        window.addEventListener('online', flushNow);
        // also try shortly after page load
        setTimeout(flushNow, 2500);
      }catch(_){ }
    })();

    // ===== Phase 1: Bulk add (project) =====
    function getActiveProjectId(){
      try{ return window.CWS.getState().ui.activeProjectId; }catch(_){ return null; }
    }
    document.getElementById("btnAddAllLC")?.addEventListener("click", ()=>{
      const pid = getActiveProjectId();
      if(!pid) return UI.toast("Selecteer eerst een project");
      if(!window.Auth || !window.Auth.phase1) return UI.toast("Niet ingelogd / API niet beschikbaar");
      UI.openModal({
        title: "Alles toevoegen (project)",
        saveLabel: "Toevoegen",
        bodyHtml: `<div style="display:grid; gap:10px;">
          <div>Voeg <b>alle WPS/WPQR</b>, <b>materialen</b> en <b>lassers</b> toe uit Instellingen aan dit project?</div>
          <div class="smallmuted">Er worden geen duplicaten aangemaakt.</div>
        </div>`,
        onSave: async ({close})=>{
          if(!window.Auth?.getAccessToken?.()){
            UI.toast("Log eerst in om dit via de API op te slaan");
            return;
          }
          const res = await window.Auth.phase1.addAllLascontrole(pid);
          close();
          UI.toast(`Toegevoegd: WPS ${res?.wps_added||0}, Materialen ${res?.materials_added||0}, Lassers ${res?.welders_added||0}`);
          try{ window.dispatchEvent(new Event("cws_lascontrole_added_all")); }catch(_){ }
        },
        onCancel: ()=>{}
      });
    });

    // ===== Phase 3: Bulk approve (project) =====
    document.getElementById("btnApproveAllLC")?.addEventListener("click", ()=>{
      const pid = getActiveProjectId();
      if(!pid) return UI.toast("Selecteer eerst een project");
      if(!window.Auth || !window.Auth.phase3) return UI.toast("Niet ingelogd / API niet beschikbaar");
      const role = (window.Auth.claims && window.Auth.claims().role) || "";
      const isAdmin = (role === "tenant_admin" || role === "platform_admin");
      UI.openModal({
        title: "Alles goedkeuren (project)",
        saveLabel: "Goedkeuren",
        bodyHtml: `<div style="display:grid; gap:10px;">
          <div>Keur inspectiechecks goed voor alle lassen in dit project.</div>
          <label class="row" style="gap:10px; align-items:center;">
            <input type="radio" name="apprMode" value="open_only" checked />
            <span>Alleen open checks goedkeuren (aanrader)</span>
          </label>
          <label class="row" style="gap:10px; align-items:center; opacity:${isAdmin?1:0.55};">
            <input type="radio" name="apprMode" value="overwrite_all" ${isAdmin?"":"disabled"} />
            <span>Alles overschrijven → goedkeuren (alleen admin)</span>
          </label>
          <div class="smallmuted">Er wordt een auditregel geschreven met aantallen en mode.</div>
        </div>`,
        onSave: async ({close})=>{
          const body = document.getElementById('uiModalBody');
          const mode = body?.querySelector('input[name="apprMode"]:checked')?.value || "open_only";
          const res = await window.Auth.phase3.approveAllLascontrole(pid, {mode});
          close();
          UI.toast(`Goedgekeurd (${res?.mode||mode}): checks ${res?.checks_updated||0}, inspecties ${res?.inspections||0}`);
          try{ window.dispatchEvent(new Event("cws_lascontrole_approved_all")); }catch(_){ }
        },
        onCancel: ()=>{}
      });
    });

    
    // ===== Phase 1: Selected lists cache (WPS / Materialen / Lassers) =====
    window.__phase1Cache = window.__phase1Cache || { pid: null, wps:null, materials:null, welders:null, loading:{} };

    function __phase1ResetIfProjectChanged(pid){
      const c = window.__phase1Cache;
      if(c.pid !== pid){
        c.pid = pid;
        c.wps = null; c.materials = null; c.welders = null;
        c.loading = {};
      }
    }

    async function __phase1LoadSelected(pid, kind){
      const c = window.__phase1Cache;
      __phase1ResetIfProjectChanged(pid);
      if(c.loading[kind]) return;
      if(kind==="wps" && c.wps) return;
      if(kind==="materials" && c.materials) return;
      if(kind==="welders" && c.welders) return;
      c.loading[kind] = true;
      try{
        if(!window.Auth || !window.Auth.phase1) throw new Error("API niet beschikbaar");

        // API is available but user is not logged in: avoid repeated 401s and keep UI usable.
        if(window.Auth.getAccessToken && !window.Auth.getAccessToken()){
          window.__apiAuthOnce = window.__apiAuthOnce || {};
          if(!window.__apiAuthOnce[kind]){
            window.__apiAuthOnce[kind] = true;
            try{ UI.toast('Login vereist om WPS/Materialen/Lassers te laden (API aan).'); }catch(_){ }
          }
          if(kind==="wps") c.wps = [];
          if(kind==="materials") c.materials = [];
          if(kind==="welders") c.welders = [];
          return;
        }

        let res = null;
        if(kind==="wps") res = await window.Auth.phase1.selectedWps(pid);
        if(kind==="materials") res = await window.Auth.phase1.selectedMaterials(pid);
        if(kind==="welders") res = await window.Auth.phase1.selectedWelders(pid);
        const rows = (res && (res.items || res.rows || res.data)) ? (res.items || res.rows || res.data) : (Array.isArray(res)?res:[]);
        if(kind==="wps") c.wps = rows;
        if(kind==="materials") c.materials = rows;
        if(kind==="welders") c.welders = rows;
	      }catch(e){
	        // If the backend is not running, keep the UI usable (no console spam).
	        const msg = String((e && (e.code || e.message)) || e || '');
	        if(msg.includes('API_OFFLINE') || msg.includes('Failed to fetch')){
	          window.__apiOfflineOnce = window.__apiOfflineOnce || {};
	          if(!window.__apiOfflineOnce[kind]){
	            window.__apiOfflineOnce[kind] = true;
	            try{ UI.toast('API offline: start backend om WPS/Materialen/Lassers te laden.'); }catch(_){ }
	          }
	          if(kind==="wps") c.wps = [];
	          if(kind==="materials") c.materials = [];
	          if(kind==="welders") c.welders = [];
	        } else {
	          console.error(e);
	        }
      }finally{
        c.loading[kind] = false;
      }
    }

    window.addEventListener("cws_project_changed", ()=>{
      try{ window.__phase1Cache.pid=null; }catch(_){ }
    });
    window.addEventListener("cws_lascontrole_added_all", ()=>{
      try{ window.__phase1Cache.pid=null; }catch(_){ }
      try{ render(); }catch(_){ }
    });

// ===== Phase 3.2: API-backed welds (after login) =====
    let __apiWeldsLoadedForProject = null;

    // ===== Phase 3.3: API-backed inspections (after login) =====
    const __apiInspectionLoaded = {}; // weldUuid -> true

    function __hasToken(){
      try{
        const t = (window.Auth && window.Auth.getAccessToken && window.Auth.getAccessToken()) || localStorage.getItem('nen1090.auth.access') || localStorage.getItem('auth_token') || '';
        return !!t;
      }catch(_){ return false; }
    }

    async function syncInspectionIntoStore(weldUiId, force=false){
      try{
        if(!__hasToken() || !window.Auth || !window.Auth.inspections) return false;
        const st = window.CWS.getState();
        const w = st.welds?.byId?.[weldUiId];
        const weldUuid = w?.uuid;
        if(!weldUuid) return false;
        if(!force && __apiInspectionLoaded[weldUuid]) return true;

        const res = await window.Auth.inspections.getForWeld(weldUuid);
        if(!res || !res.exists || !res.inspection){
          __apiInspectionLoaded[weldUuid] = true;
          return true; // nothing stored yet
        }

        // Apply check states into local criteria store (st.controls.byWeld)
        const insp = res.inspection;
        const checks = insp.checks || [];
        const byKey = {};
        checks.forEach(c=>{ byKey[c.criterion_key] = c; });

        st.controls = st.controls || { byWeld: {} };
        st.controls.byWeld = st.controls.byWeld || {};
        // ensure base controls exist
        try{ window.CWS.ensureControlsForWeld(weldUiId); }catch(_){
          // if ensureControls fails, still proceed if structure exists
          st.controls.byWeld[weldUiId] = st.controls.byWeld[weldUiId] || {};
        }

        const groups = st.controls.byWeld[weldUiId] || {};
        Object.keys(groups).forEach(gk=>{
          (groups[gk]||[]).forEach(it=>{
            const c = byKey[it.id];
            if(!c) return;
            it.vanToepassing = !!c.applicable;
            it.goedgekeurd = !!c.approved;
            it.opmerking = c.comment || "";
          });
        });

        // Store inspection meta (for UI status)
        st.inspections = st.inspections || { byWeld: {} };
        st.inspections.byWeld[weldUiId] = {
          uuid: insp.id,
          inspector: insp.inspector || "",
          inspected_at: insp.inspected_at || null,
          overall_status: insp.overall_status || "open",
          remarks: insp.remarks || "",
        };

        window.CWS.setState(st);
        __apiInspectionLoaded[weldUuid] = true;
        return true;
      }catch(e){
        console.error(e);
        return false;
      }
    }

    async function syncWeldsIntoStore(force=false){
      try{
        if(!window.Auth || !window.CWS || !window.CWS.getState) return false;
        const token = (window.Auth.getAccessToken && window.Auth.getAccessToken()) || localStorage.getItem('nen1090.auth.access') || localStorage.getItem('auth_token') || '';
        if(!token) return false;

        const st = window.CWS.getState();
        const pid = st.ui.activeProjectId;
        if(!pid) return false;
        if(!force && __apiWeldsLoadedForProject === pid) return true;

        const list = await window.Auth.welds.list(pid);
        // Merge into store (keyed by weld_no for UI display); also keep uuid for API ops
        st.welds = st.welds || { byId:{}, byProject:{} };
        st.welds.byProject[pid] = [];
        (list||[]).forEach(w=>{
          const uiId = w.weld_no || w.id;
          st.welds.byId[uiId] = {
            id: uiId,
            uuid: w.id,
            projectId: w.project_id,
            locatie: w.location || "",
            proces: w.process || "",
            materiaal: w.material || "",
            dikte: w.thickness || "",
            lassers: w.welders || "",
            vtStatus: w.vt_status || "",
            ndoStatus: w.ndo_status || "",
            fotos: w.photos || 0,
            status: w.status || "open",
            last: (w.updated_at || w.created_at || "").toString(),
          };
          st.welds.byProject[pid].push(uiId);
        });
        window.CWS.setState(st);
        __apiWeldsLoadedForProject = pid;
        try{ window.dispatchEvent(new Event("cws_welds_changed")); }catch(_){}
        return true;
      }catch(e){
        console.error(e);
        return false;
      }
    }

    window.addEventListener("auth-changed", ()=>{
      __apiWeldsLoadedForProject=null;
      try{ Object.keys(__apiInspectionLoaded).forEach(k=>delete __apiInspectionLoaded[k]); }catch(_){ }
      syncWeldsIntoStore(true).then(()=>render());
    });
    window.addEventListener("cws_project_changed", ()=>{
      __apiWeldsLoadedForProject=null;
      try{ Object.keys(__apiInspectionLoaded).forEach(k=>delete __apiInspectionLoaded[k]); }catch(_){ }
      syncWeldsIntoStore(true).then(()=>render());
    });

    // initial attempt (if already logged in)
    syncWeldsIntoStore(true);


    function getColsCfg(stateKey, cols){
      const st = window.CWS.getState();
      st.ui.view = st.ui.view || {};
      const cfg = st.ui.view[stateKey] || { order: cols.map(c=>c.key), hidden: [] };
      const order = (cfg.order||[]).filter(k=>cols.some(c=>c.key===k));
      cols.forEach(c=>{ if(!order.includes(c.key)) order.push(c.key); });
      const hidden = new Set(cfg.hidden||[]);
      const visible = order.filter(k=>!hidden.has(k));
      return {order, hidden, visible};
    }

    function renderChecklistTable(headEl, bodyEl, stateKey, cols, items){
      const cfg = getColsCfg(stateKey, cols);
      headEl.innerHTML = cfg.visible.map(k=>`<th data-k="${UI.esc(k)}" draggable="true">${UI.esc(cols.find(c=>c.key===k).label)}</th>`).join("");

      const groups = {};
      (items||[]).forEach(it=>{
        const g = (it.norm||it.groep||"Overig").trim() || "Overig";
        groups[g] = groups[g] || [];
        groups[g].push(it);
      });
      const order = Object.keys(groups).sort();
      const rowsHtml = [];
      order.forEach(g=>{
        rowsHtml.push(`<tr class="groupRow"><td colspan="${cfg.visible.length}" style="background:#f8fafc;font-weight:700;color:#0f172a">${UI.esc(g)}</td></tr>`);
        groups[g].forEach(it=>{
          rowsHtml.push(
            `<tr data-id="${UI.esc(it.id)}">` + cfg.visible.map(k=>{
              const col = cols.find(c=>c.key===k);
              return `<td>${col ? col.cell(it) : ""}</td>`;
            }).join("") + `</tr>`
          );
        });
      });
      bodyEl.innerHTML = rowsHtml.length ? rowsHtml.join("") : `<tr><td colspan="${cfg.visible.length||1}" class="smallmuted">Geen items.</td></tr>`;

      let drag=null;
      headEl.ondragstart = (e)=>{ const th=e.target.closest("th[data-k]"); if(!th) return; drag=th; e.dataTransfer.effectAllowed="move"; };
      headEl.ondragover = (e)=>{ e.preventDefault(); const th=e.target.closest("th[data-k]"); if(!th||!drag||th===drag) return;
        const rect=th.getBoundingClientRect(); const before=(e.clientX-rect.left)<rect.width/2;
        headEl.insertBefore(drag, before?th:th.nextSibling);
      };
      headEl.ondrop = (e)=>{ e.preventDefault(); if(!drag) return;
        const newOrder=[...headEl.querySelectorAll("th[data-k]")].map(x=>x.getAttribute("data-k"));
        const st2=window.CWS.getState(); st2.ui.view=st2.ui.view||{};
        const old=st2.ui.view[stateKey]||{order:cols.map(c=>c.key),hidden:[]};
        const hidden=old.hidden||[];
        st2.ui.view[stateKey]={order:[...newOrder, ...hidden.filter(k=>!newOrder.includes(k))], hidden};
        window.CWS.setState(st2); drag=null; render();
      };
    }

    function renderDynTable(headEl, bodyEl, stateKey, cols, items){
      const cfg = getColsCfg(stateKey, cols);
      headEl.innerHTML = cfg.visible.map(k=>`<th data-k="${UI.esc(k)}" draggable="true">${UI.esc(cols.find(c=>c.key===k).label)}</th>`).join("");
      bodyEl.innerHTML = items.length ? items.map(it=>(
        `<tr data-id="${UI.esc(it.id)}">` + cfg.visible.map(k=>{
          const col=cols.find(c=>c.key===k);
          return `<td>${col ? col.cell(it) : ""}</td>`;
        }).join("") + `</tr>`
      )).join("") : `<tr><td colspan="${cfg.visible.length||1}" class="smallmuted">Geen items.</td></tr>`;

      let drag=null;
      headEl.ondragstart = (e)=>{ const th=e.target.closest("th[data-k]"); if(!th) return; drag=th; e.dataTransfer.effectAllowed="move"; };
      headEl.ondragover = (e)=>{ e.preventDefault(); const th=e.target.closest("th[data-k]"); if(!th||!drag||th===drag) return;
        const rect=th.getBoundingClientRect(); const before=(e.clientX-rect.left)<rect.width/2;
        headEl.insertBefore(drag, before?th:th.nextSibling);
      };
      headEl.ondrop = (e)=>{ e.preventDefault(); if(!drag) return;
        const newOrder=[...headEl.querySelectorAll("th[data-k]")].map(x=>x.getAttribute("data-k"));
        const st2=window.CWS.getState(); st2.ui.view=st2.ui.view||{};
        const old=st2.ui.view[stateKey]||{order:cols.map(c=>c.key),hidden:[]};
        const hidden=old.hidden||[];
        st2.ui.view[stateKey]={order:[...newOrder, ...hidden.filter(k=>!newOrder.includes(k))], hidden};
        window.CWS.setState(st2); drag=null; render();
      };
    }


    const TABDEF = [
      {k:"lassen", label:"Lassen"},
      {k:"controles", label:"Controles"},
      {k:"lasplan", label:"Lasplan (WPS/WPQR)"},
      {k:"ndo", label:"NDO plan"},
      {k:"materialen", label:"Materialen"},
      {k:"lassers", label:"Lassers"},
      {k:"documenten", label:"Documenten & Foto’s"},
      {k:"certificaten", label:"Certificaten"},
      {k:"checklist", label:"Checklist & Conform"},
      {k:"rapportage", label:"Rapportage"},
      {k:"historie", label:"Revisies / Historie"}
    ];

    function getTab(){
      const st = window.CWS.getState();
      return st.ui.view.lasTab || "lassen";
    }
    function setTab(k){
      const st = window.CWS.getState();
      st.ui.view.lasTab = k;
      window.CWS.setState(st);
    render();
    }

    function fuzzy(hay, q){
      hay = (hay||"").toLowerCase();
      q = (q||"").toLowerCase().trim();
      if(!q) return true;
      return q.split(/\s+/).every(t=>hay.includes(t));
    }

    // ===== Phase 3.4: Inspection status pills + autosave =====


    function inspPill(status){
      const s = String(status||'').toLowerCase();
      const base = 'display:inline-block;padding:2px 8px;border-radius:999px;font-weight:900;font-size:11px;line-height:1';
      if(s==='ok') return `<span style="${base};background:#16a34a;color:white">OK</span>`;
      if(s==='nok') return `<span style="${base};background:#ef4444;color:white">NOK</span>`;
      if(s==='nvt') return `<span style="${base};background:#94a3b8;color:white">N.v.t.</span>`;
      if(!s) return `<span style="${base};background:#e2e8f0;color:#0f172a">—</span>`;
      return `<span style="${base};background:#f59e0b;color:#111827">OPEN</span>`;
    }

    let __inspSaveTimer = null;

    function __scheduleInspectionAutosave(weldUiId){
      try{ clearTimeout(__inspSaveTimer); }catch(_){ }
      __inspSaveTimer = setTimeout(()=>{ __saveInspectionNow(weldUiId, true).catch(()=>{}); }, 900);
    }

    async function __saveInspectionNow(weldUiId, silent=false){
      if(!window.Auth || !window.Auth.inspections || !__hasToken()) return false;
      const st2 = window.CWS.getState();
      const p = activeProject();
      if(p && (p.locked || p.status==='locked')){ if(!silent) UI.toast('Project is locked (read-only).'); return false; }
      const w = st2.welds?.byId?.[weldUiId];
      const weldUuid = w?.uuid;
      if(!weldUuid) return false;

      const groups = (st2.controls?.byWeld?.[weldUiId]) || {};
      const checks = [];
      Object.keys(groups).forEach(gk=>{
        (groups[gk]||[]).forEach(it=>{
          checks.push({
            group_key: gk,
            criterion_key: it.id,
            applicable: !!it.vanToepassing,
            approved: !!it.goedgekeurd,
            comment: it.opmerking || '',
          });
        });
      });

      const applicable = checks.filter(c=>c.applicable);
      let overall = 'open';
      if(applicable.length===0) overall = 'nvt';
      else if(applicable.every(c=>c.approved)) overall = 'ok';
      else overall = 'nok';

      const me = (window.Auth.getUserEmail && window.Auth.getUserEmail()) || '';
      const payload = {
        inspector: me || null,
        inspected_at: new Date().toISOString(),
        overall_status: overall,
        remarks: (st2.inspections?.byWeld?.[weldUiId]?.remarks) || '',
        checks,
      };

      const insp = await window.Auth.inspections.upsertForWeld(weldUuid, payload);

      const st3 = window.CWS.getState();
      st3.inspections = st3.inspections || { byWeld: {} };
      st3.inspections.byWeld[weldUiId] = {
        uuid: insp.id,
        inspector: insp.inspector || '',
        inspected_at: insp.inspected_at || null,
        overall_status: insp.overall_status || overall,
        remarks: insp.remarks || '',
      };
      window.CWS.setState(st3);
      if(!silent) UI.toast('Inspectie opgeslagen (backend).');
      return true;
    }


    function renderTabs(){
      const wrap = document.getElementById("tabs");
      const active = getTab();
      wrap.innerHTML = TABDEF.map(t=>(
        '<div class="tab '+(t.k===active?'active':'')+'" data-k="'+t.k+'">'+UI.esc(t.label)+'</div>'
      )).join("");
      wrap.onclick = (e)=>{

      try{ window.CWS.ensureChecklist(p.id); }catch(_){ }
      const cl = (st.checklist?.byProject?.[p.id]) || { items:[], signature:{}, locked:false };
      // backwards compat: migrate any oude velden (applicable/approved/goedgekeurd) naar status
      (cl.items||[]).forEach(it=>{
        if(!it) return;
        if(it.status) return;
        const app = (it.vanToepassing ?? it.applicable ?? true);
        it.vanToepassing = !!app;
        const ok = (it.goedgekeurd ?? it.approved ?? false);
        it.status = ok ? 'conform' : 'in_controle';
      });

      const prog = (window.parent?.CWS?.checklistProgress ? window.parent.CWS.checklistProgress(p.id) : {ok:0,total:0});
      const percent = prog.total ? Math.round((prog.ok/prog.total)*100) : 0;

      const locked = !!p.locked || p.status==='locked' || !!cl.locked;
      const canEdit = (window.parent?.Permissions?.canEdit?.() ?? true) && !locked;

      const pill = (s)=>{
        s = String(s||'in_controle');
        const base='display:inline-block;padding:2px 10px;border-radius:999px;font-weight:900;font-size:11px;line-height:1';
        if(s==='conform') return `<span style="${base};background:#16a34a;color:white">Conform</span>`;
        if(s==='in_controle') return `<span style="${base};background:#3b82f6;color:white">In controle</span>`;
        if(s==='afgekeurd') return `<span style="${base};background:#f59e0b;color:#111827">Afgekeurd</span>`;
        return `<span style="${base};background:#e2e8f0;color:#0f172a">—</span>`;
      };

      const rows = (cl.items||[]).map(it=>{
        const id = it.id;
        const stVal = String(it.status||'in_controle');
        return `<tr data-id="${UI.esc(id)}">
          <td>${UI.esc(it.title||'')}</td>
          <td>${UI.esc(it.norm||'')}</td>
          <td><input type="checkbox" data-f="van" ${it.vanToepassing?'checked':''} ${canEdit?'':'disabled'}></td>
          <td>
            <select class="input" data-f="status" ${canEdit?'':'disabled'} style="min-width:160px">
              <option value="in_controle" ${stVal==='in_controle'?'selected':''}>In controle</option>
              <option value="conform" ${stVal==='conform'?'selected':''}>Conform</option>
              <option value="afgekeurd" ${stVal==='afgekeurd'?'selected':''}>Afgekeurd</option>
            </select>
            <span style="margin-left:8px">${pill(stVal)}</span>
          </td>
          <td><input class="input" style="min-width:260px" data-f="opm" value="${UI.esc(it.opmerking||'')}" placeholder="Opmerking" ${canEdit?'':'disabled'}></td>
          <td><button class="smallbtn" data-f="del" ${canEdit?'':'disabled'}>Verwijderen</button></td>
        </tr>`;
      }).join('') || `<tr><td colspan="6" class="smallmuted">Geen checklist-items.</td></tr>`;

      return `
        <div class="panel-head">
          <div class="panel-tools">
            <span class="pillmini">Project: <strong>${UI.esc(p.nummer)}</strong></span>
            <span class="pillmini">Projectstatus: <strong>${UI.esc(p.status)}</strong></span>
            <div class="progress">
              <div class="progressbar"><div style="width:${percent}%"></div></div>
              <strong>${prog.ok}/${prog.total} (${percent}%)</strong>
            </div>
            <button class="btn" data-bulk="all_off" ${canEdit?'':'disabled'}>Alles afvinken</button>
            <button class="btn" data-bulk="approve_applicable" ${canEdit?'':'disabled'}>Alles goedkeuren</button>
            <button class="btn" data-bulk="reset_norm" ${canEdit?'':'disabled'}>Reset naar norm</button>
          </div>
          <div class="kbd">${locked ? 'Locked: alles read-only.' : 'Dubbelklik op rij → instellingen (onderdeel).'} </div>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Onderdeel</th>
                <th>Norm</th>
                <th style="width:120px">Van toepassing</th>
                <th style="width:340px">Status</th>
                <th>Opmerking</th>
                <th style="width:120px">Actie</th>
              </tr>
            </thead>
            <tbody id="clRows">${rows}</tbody>
          </table>
        </div>

        <div class="panel-head" style="border-top:1px solid var(--border);">
          <div class="panel-tools">
            <input class="input" id="sigName" placeholder="Naam" value="${UI.esc(cl.signature?.name||'')}" ${canEdit?'':'disabled'}>
            <input class="input" id="sigText" placeholder="Handtekening (tekst)" value="${UI.esc(cl.signature?.signatureText||'')}" ${canEdit?'':'disabled'}>
            <button class="btn" id="btnLock" ${canEdit && (prog.ok===prog.total && prog.total>0) ? '' : 'disabled'}>Conform verklaren & Lock</button>
            <button class="btn" id="btnUnlock" ${((window.parent?.Permissions?.canAdmin?.() ?? false) && locked) ? '' : 'disabled'}>Unlock (Admin)</button>
          </div>
          <div class="kbd">Lock = audit-proof: wijzigingen uitgeschakeld, revisie vastgelegd.</div>
        </div>

        <div class="footerbar">
          <div>${(cl.items||[]).length} checklist-items</div>
          <div class="pagination"><button class="pagebtn" disabled>‹</button><span>1</span><button class="pagebtn" disabled>›</button></div>
        </div>
      `;
    }

    function downloadText(filename, text, mime){
      const blob = new Blob([text], {type: (mime||"text/plain;charset=utf-8")});
      const a = document.createElement("a");

      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();

          const assessment = container.querySelector('#isoAssess')?.value || "open";
          const description = container.querySelector('#isoDesc')?.value || null;
          try{
            await window.Auth.iso5817.createDefect(projectId, { weld_id: weldUuid, defect_type, iso5817_level_used: iso, assessment, description, evidence_attachment_ids: [] });

            UI.toast("Kon defect niet toevoegen.");

    function bindDocumenten(){
      const __ro = isRO();

      const tab = getTab();
      if(tab!=="documenten") return;

      // kolommen documenten
      const head = document.getElementById("docHead");
      const body5 = document.getElementById("docRows");
      const list = window.__docList || [];
      const DCOLS = [
        {key:"name", label:"Naam", cell:(d)=>UI.esc(d.name||"")},
        {key:"mime", label:"Type", cell:(d)=>UI.esc((d.mime||"").split("/")[1]||d.mime||"")},
        {key:"weldId", label:"Las", cell:(d)=>UI.esc(d.weldId||"-")},
        {key:"size", label:"Grootte", cell:(d)=>UI.esc(d.size? (Math.round(d.size/102.4)/10)+" KB":"")},
        {key:"actie", label:"Actie", cell:()=>'<button class="smallbtn" data-act="dl">Download</button> <button class="smallbtn" data-act="del">Verwijderen</button>'}
      ];
      if(head && body5){
        renderDynTable(head, body5, "documentenCols", DCOLS, list.map(d=>({...d, id:d.id})));
      }
      const btnCols = document.getElementById("docCols");
      if(btnCols){
        btnCols.onclick = ()=>UI.columnManager({title:"Kolommen (Documenten)", columns: DCOLS.filter(c=>c.key!=="actie"), stateKey:"documentenCols", onApply: ()=>render()});
      }

      const add = document.getElementById("docAdd");
      const input = document.getElementById("docFile");
      const photoAdd = document.getElementById("photoAdd");
      const photoInput = document.getElementById("photoFile");
      const weldSel = document.getElementById("docWeld");
      const drop = document.getElementById("docDrop");

      async function handleFiles(files){
        const st2 = window.CWS.getState();
        const p = activeProject();
        if(!p) return;
        const weldId = (weldSel?.value||"") || null;

        for(const f of files){
          const id = "D-" + Date.now() + "-" + Math.floor(Math.random()*10000);
          const dataUrl = await new Promise((res, rej)=>{
            const r = new FileReader();
            r.onload = ()=>res(String(r.result||""));
            r.onerror = ()=>rej(new Error("read failed"));
            r.readAsDataURL(f);
          });
          try{
            window.CWS.upsertDocument({
              id,
              projectId: p.id,
              weldId,
              name: f.name,
              mime: f.type || "application/octet-stream",
              size: f.size,
              dataUrl
            });
          }catch(e){
            console.error(e);
            UI.toast("Upload mislukt: " + f.name);
          }
        }
        UI.toast("Upload klaar.");
        render();
      }

      if(add){
        add.addEventListener("click", async ()=>{
          const files = input?.files;
          if(!files || !files.length){ UI.toast("Kies bestand(en)."); return; }
          await handleFiles(Array.from(files));
          input.value = "";
        });
      }

      // Mobile: direct camera/photo upload (adds as document/photo)
      if(photoAdd && photoInput){
        photoAdd.addEventListener('click', ()=>{
          if(__ro){ UI.toast('Alleen-lezen'); return; }
          photoInput.click();
        });
        photoInput.addEventListener('change', async ()=>{
          const files = photoInput.files;
          if(files && files.length){
            await handleFiles(Array.from(files));
          }
          photoInput.value = '';
        });
      }

      if(drop){
        drop.addEventListener("dragover", (e)=>{ e.preventDefault(); drop.classList.add("drop-hint"); });
        drop.addEventListener("dragleave", ()=>drop.classList.remove("drop-hint"));
        drop.addEventListener("drop", async (e)=>{
          e.preventDefault();
          drop.classList.remove("drop-hint");
          const files = Array.from(e.dataTransfer.files||[]);
          if(files.length) await handleFiles(files);
        });
      }

      const body6 = document.getElementById("docRows");
      if(!body6) return;
      body6.onclick = (e)=>{
        const btn = e.target.closest("button"); if(!btn) return;
        const tr = e.target.closest("tr"); if(!tr) return;
        const id = tr.getAttribute("data-id");
        const act = btn.getAttribute("data-act");
        const st2 = window.CWS.getState();
        const doc = st2.documents?.byId?.[id];
        if(!doc) return;
        if(act==="open"){
          // Open in new window/tab (data URL)
          try{ window.open(doc.dataUrl, "_blank"); }catch(_){ UI.toast("Openen geblokkeerd."); }
        }
        if(act==="del"){
          const ok = confirm("Document verwijderen?");
          if(!ok) return;
          window.CWS.removeDocument(id);
          UI.toast("Verwijderd.");
          render();
        }
      };
    }

            const esc = (s)=>String(s??"").replace(/[&<>"']/g, c=>({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
            const evid = docs.map((d,i)=>{

              }
              return `<div style="margin:10px 0;color:#64748b">Bijlage: ${name} (niet inline — zie ZIP export)</div>`;
            }).join("");

            const workers = Object.values(st.settings?.workers?.byId||{}).filter(Boolean);
            const workerPdfs = workers.filter(w=>w.certPdfDataUrl).map(w=>{
              const nm = esc(w.certPdfName || (w.id+"_cert.pdf"));
              return `<h3 style="margin:18px 0 6px 0">Werknemer certificaat (PDF): ${esc(w.naam||w.id)} — ${nm}</h3>
                      <embed src="${w.certPdfDataUrl}" type="application/pdf" style="width:100%;height:920px;border:1px solid #e5e7eb;border-radius:10px" />`;
            }).join("");

            const css = `<style>
              @media print{
                .noprint{display:none}
                h2{break-before:page;page-break-before:always}
                .box{break-inside:avoid}
                table{break-inside:avoid}
              }
              body11{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;margin:24px;color:#0f172a}
              .hint{padding:12px;border:1px solid #e5e7eb;border-radius:12px;background:#f8fafc;margin:0 0 12px 0}
            </style>`;

            const wrapper = `<!doctype html><html lang="nl"><head><meta charset="utf-8"><title>Dossier PDF ${esc(p.nummer)}</title>${css}</head>
              <body11>
                <div class="hint noprint">
                  Tip: kies in de printdialoog “Opslaan als PDF”. Ingevoegde PDF-bijlagen worden door Chrome/Edge meestal als pagina’s meegenomen.
                </div>
                ${html.replace("</body11></html>","")}
                <h2 style="margin-top:26px">Bijlagen / bewijsstukken</h2>
                ${evid || '<div style="color:#64748b">Geen bijlagen.</div>'}
                ${workerPdfs ? '<h2 style="margin-top:26px">Werknemer certificaten</h2>'+workerPdfs : ''}
              </body11></html>`;

            const frame = document.getElementById("printFrame");
            frame.srcdoc = wrapper;
            frame.onload = ()=>{
              frame.contentWindow.focus();
              frame.contentWindow.print();
              UI.toast("Print gestart (Opslaan als PDF).");
            };
          }catch(e){
            console.error(e);
            UI.toast("PDF export mislukt.");
          }
        });
      }


      if(btnPdfMerge){
        btnPdfMerge.addEventListener("click", async ()=>{
          try{
            if(!window.PDFLib || !window.PDFLib.PDFDocument){
              UI.toast("pdf-lib ontbreekt. Plaats js/vendor/pdf-lib.min.js (zie README_PDFLIB.txt).");
              return;

            const { PDFDocument, StandardFonts, rgb } = window.PDFLib;
            const st = window.CWS.getState();

            // Collect evidence: PDFs + images
            const docIds = (st.documents?.byProject?.[p.id]||[]);
            const docs = docIds.map(id=>st.documents.byId[id]).filter(Boolean);

            const workers = Object.values(st.settings?.workers?.byId||{}).filter(Boolean);
            const workerPdfs = workers.filter(w=>w.certPdfDataUrl).map(w=>({
              name: (w.certPdfName || (w.id+"_cert.pdf")),
              mime: "application/pdf",
              dataUrl: w.certPdfDataUrl
            }));

            const items = [...docs, ...workerPdfs].map((d,i)=>({
              name: d.name || ("Bijlage_"+(i+1)),
              mime: d.mime || (d.dataUrl && d.dataUrl.startsWith("data:application/pdf") ? "application/pdf" : ""),
              dataUrl: d.dataUrl || ""
            })).filter(x=>x.dataUrl);

            const outPdf = await PDFDocument.create();
            const font = await outPdf.embedFont(StandardFonts.Helvetica);

            // Cover page
            const page = outPdf.addPage([595.28, 841.89]); // A4 portrait points
            const title = `Dossier – ${p.nummer}`;
            const sub = `${p.naam||""}`;
            const meta = `Opdrachtgever: ${p.opdrachtgever||"-"}   Status: ${p.status||"-"}`;
            const meta2 = `Bijlagen: ${items.length}   Datum: ${new Date().toISOString().slice(0,19).replace("T"," ")}`;
            page.drawText(title, {x: 48, y: 790, size: 22, font, color: rgb(0.06,0.09,0.16)});
            page.drawText(sub, {x: 48, y: 760, size: 12, font, color: rgb(0.2,0.25,0.35)});
            page.drawText(meta, {x: 48, y: 730, size: 11, font, color: rgb(0.2,0.25,0.35)});
            page.drawText(meta2, {x: 48, y: 710, size: 11, font, color: rgb(0.2,0.25,0.35)});
            page.drawText("Inhoud (samenvatting)", {x:48, y: 675, size: 12, font, color: rgb(0.06,0.09,0.16)});
            const bullets = [
              `Lassen: ${(st.welds?.byProject?.[p.id]||[]).length}`,
              `Docs: ${docIds.length}`,
              `Checklist: ${(st.checklist?.byProject?.[p.id]||[]).length || 0}`,
              `Revisies: ${(st.revisions?.byProject?.[p.id]||[]).length || 0}`,
            ];
            bullets.forEach((b, idx)=> page.drawText("• " + b, {x:60, y: 650 - idx*18, size: 11, font, color: rgb(0.2,0.25,0.35)}));

            // helper: dataUrl -> Uint8Array
            function dataUrlToBytes(dataUrl){
              const b64 = String(dataUrl).split(",")[1] || "";
              const bin = atob(b64);
              const out = new Uint8Array(bin.length);
              for(let i=0;i<bin.length;i++) out[i]=bin.charCodeAt(i);
              return out;
            }

            // append each item
            for(const it of items){
              const mime = (it.mime || "").toLowerCase();
              if(mime === "application/pdf" || it.dataUrl.startsWith("data:application/pdf")){
                const srcBytes = dataUrlToBytes(it.dataUrl);
                const srcPdf = await PDFDocument.load(srcBytes);
                const copied = await outPdf.copyPages(srcPdf, srcPdf.getPageIndices());
                copied.forEach(pg=> outPdf.addPage(pg));
              }else if(mime.startsWith("image/") || it.dataUrl.startsWith("data:image/")){
                const bytes = dataUrlToBytes(it.dataUrl);
                let img;
                if(mime.includes("png") || it.dataUrl.startsWith("data:image/png")) img = await outPdf.embedPng(bytes);
                else img = await outPdf.embedJpg(bytes);
                const pg = outPdf.addPage([595.28, 841.89]);
                const maxW = 595.28 - 2*36;
                const maxH = 841.89 - 2*36;
                const scale = Math.min(maxW / img.width, maxH / img.height);
                const w = img.width * scale;
                const h = img.height * scale;
                pg.drawText(it.name, {x:36, y: 841.89-28, size: 10, font, color: rgb(0.2,0.25,0.35)});
                pg.drawImage(img, {x:(595.28-w)/2, y:(841.89-h)/2, width:w, height:h});
              }
            }

            const pdfBytes = await outPdf.save();
            const blob = new Blob([pdfBytes], {type:"application/pdf"});
            UI.downloadBlob(`dossier_${p.nummer}_bijlagen.pdf`, blob);
            UI.toast("PDF merge gedownload.");
          }catch(e){
            console.error(e);
            UI.toast("PDF merge mislukt.");
          }
        });
      }

if(btnZip){
        btnZip.addEventListener("click", ()=>{
          try{
            const st = window.CWS.getState();
            const html = buildReportHTML(p.id);
            const jsonText = exportDossierJSON(p.id);
            const zip = new TinyZip();

            // core dossier files
            zip.addText(`dossier_${p.nummer}/rapport.html`, html);
            zip.addText(`dossier_${p.nummer}/dossier.json`, jsonText);

            // export docs as original files when possible
            const docIds = (st.documents?.byProject?.[p.id]||[]);
            const docs = docIds.map(id=>st.documents.byId[id]).filter(Boolean);
            docs.forEach((d, i)=>{
              const safeName = (d.name || ("doc_"+(i+1))).replace(/[<>:"/\\|?*\x00-\x1F]/g, "_");
              const ext = (safeName.includes(".") ? "" : (d.mime==="application/pdf"?".pdf": (d.mime||"").startsWith("image/")?".png":""));
              const fname = safeName + ext;
              if(d.dataUrl){
                zip.addDataUrl(`dossier_${p.nummer}/bewijsstukken/${fname}`, d.dataUrl);
              }
            });

            // export worker cert PDFs if present
            const workers = Object.values(st.settings?.workers?.byId||{});
            workers.forEach(w=>{
              if(w.certPdfDataUrl){
                const safeName = (w.certPdfName || (w.id+"_cert.pdf")).replace(/[<>:"/\\|?*\x00-\x1F]/g, "_");
                zip.addDataUrl(`dossier_${p.nummer}/werknemers/${w.id}/${safeName}`, w.certPdfDataUrl);
              }
            });

            const bytes = zip.build();
            const blob = new Blob([bytes], {type:"application/zip"});
            UI.downloadBlob(`dossier_${p.nummer}.zip`, blob);
            UI.toast("ZIP dossier gedownload.");
          }catch(e){
            console.error(e);
            UI.toast("ZIP export mislukt.");
          }
        });
      }

if(btnPrint){
        btnPrint.addEventListener("click", ()=>{
          const html = buildReportHTML(p.id);
          const frame = document.getElementById("printFrame");
          if(!frame){ UI.toast("Print frame ontbreekt."); return; }
          // write srcdoc and print from iframe (zonder extra popup-window)
          frame.srcdoc = html;
          frame.onload = ()=>{
            try{
              frame.contentWindow.focus();
              frame.contentWindow.print();
              UI.toast("Print gestart.");
            }catch(e){
              console.error(e);
              UI.toast("Print mislukt.");
            }
          };
        });
      }
    }

    function editWeld(id){
      const p0 = activeProject();
      if(p0 && (p0.locked || p0.status==='locked')){ UI.toast('Project is locked (read-only).'); return; }
      const st = window.CWS.getState();
      const w0 = st.welds.byId[id];
      if(!w0) return;

      UI.modalForm({
        title: "Las bewerken",
        submitLabel: "Opslaan",
        values: w0,
        fields: [
          {key:"id", label:"Las-ID", readonly:true},
          {key:"locatie", label:"Locatie"},
          {key:"proces", label:"Proces", type:"select", options:["111","135","136","138","141"]},
          {key:"materiaal", label:"Materiaal"},
          {key:"dikte", label:"Dikte (mm)"},
          {key:"lassers", label:"Lasser(s)"},
          {key:"status", label:"Status", type:"select", options:["open","conform","afgekeurd"]}
        ],
        onSubmit: async (v)=>{
          const token = (window.Auth?.getAccessToken && window.Auth.getAccessToken()) || localStorage.getItem('nen1090.auth.access') || localStorage.getItem('auth_token') || '';
          const p = activeProject();
          if(window.Auth && token && w0.uuid && p){
            try{
              await window.Auth.welds.update(p.id, w0.uuid, {
                weld_no: w0.id,
                location: v.locatie,
                process: v.proces,
                material: v.materiaal,
                thickness: v.dikte,
                welders: v.lassers,
                status: v.status,
              });
              await syncWeldsIntoStore(true);
              UI.toast("Las bijgewerkt (API).");
              render();
              return true;
            }catch(e){ console.error(e); UI.toast("Opslaan mislukt (API)." ); return false; }
          }
          window.CWS.upsertWeld({...w0, ...v});
          UI.toast("Las bijgewerkt.");
          render();
        }
      });
    }

    function delWeld(id){
      const p0 = activeProject();
      if(p0 && (p0.locked || p0.status==='locked')){ UI.toast('Project is locked (read-only).'); return; }

      const ok = confirm("Las verwijderen?");
      if(!ok) return;
      const token = (window.Auth?.getAccessToken && window.Auth.getAccessToken()) || localStorage.getItem('nen1090.auth.access') || localStorage.getItem('auth_token') || '';
      const st = window.CWS.getState();
      const w0 = st.welds.byId[id];
      const p = activeProject();
      if(window.Auth && token && w0 && w0.uuid && p){
        window.Auth.welds.remove(p.id, w0.uuid).then(async ()=>{
          await syncWeldsIntoStore(true);
          UI.toast("Verwijderd (API)." );
          render();
        }).catch(e=>{ console.error(e); UI.toast("Verwijderen mislukt (API)." ); });
        return;
      }
      const done = window.CWS.removeWeld(id);
      UI.toast(done ? "Verwijderd." : "Niet gevonden.");
      render();
    }

    document.getElementById("btnApps").addEventListener("click", ()=>AppsMenu.show());
    document.getElementById("q").addEventListener("input", render);
    document.getElementById("btnNewWeld").addEventListener("click", ()=>{
      const p0 = activeProject();
      if(p0 && (p0.locked || p0.status==='locked')){ UI.toast('Project is locked (read-only).'); return; }

      const p = activeProject();
      if(!p){ UI.toast("Selecteer eerst een project in Projecten."); return; }
      UI.modalForm({
        title:"Nieuwe las", submitLabel:"Aanmaken",
        values:{id:"W-", locatie:"", proces:"135", materiaal:"S355", dikte:"", lassers:""},
        fields:[
          {key:"id", label:"Las-ID"},
          {key:"locatie", label:"Locatie"},
          {key:"proces", label:"Proces", type:"select", options:["111","135","136","138","141"]},
          {key:"materiaal", label:"Materiaal"},
          {key:"dikte", label:"Dikte (mm)"},
          {key:"lassers", label:"Lasser(s)"}
        ],
        onSubmit: async (v)=>{
          const id = (v.id||"").trim();
          if(!id){ UI.toast("Las-ID verplicht."); return false; }
          const st2 = window.CWS.getState();
          const p = activeProject();
          if(!p){ UI.toast("Geen project."); return false; }
          const token = (window.Auth?.getAccessToken && window.Auth.getAccessToken()) || localStorage.getItem('nen1090.auth.access') || localStorage.getItem('auth_token') || '';
          if(window.Auth && token){
            try{
              await window.Auth.welds.create(p.id, {
                weld_no: id,
                location: v.locatie||"",
                process: v.proces||"",
                material: v.materiaal||"",
                thickness: v.dikte||"",
                welders: v.lassers||"",
                status: "open",
                vt_status: "open",
                ndo_status: "open",
                photos: 0,
                result: "pending",
              });
              await syncWeldsIntoStore(true);
              UI.toast("Las toegevoegd (API)." );
              render();
              return true;
            }catch(e){ console.error(e); UI.toast("Aanmaken mislukt (API)." ); return false; }
          }
          if(st2.welds.byId[id]){ UI.toast("Las-ID bestaat al."); return false; }
          const w = { id, projectId:p.id, locatie:v.locatie||"", proces:v.proces||"", materiaal:v.materiaal||"", dikte:v.dikte||"", lassers:v.lassers||"", status:"open", vtStatus:"open", ndoStatus:"open" };
          window.CWS.upsertWeld(w);
          UI.toast("Las toegevoegd.");
          render();
        }
      });
      return;
      if(!id) return;
      const locatie = prompt("Locatie", "");
      if(locatie===null) return;
      window.CWS.upsertWeld({
        id: id.trim(),
        projectId: p.id,
        locatie,
        proces:"135",
        materiaal:"S355",
        dikte:"8",
        lassers:"",
        vtStatus:"open",
        ndoStatus:"nvt",
        fotos:0,
        status:"open"
      });
      UI.toast("Las aangemaakt.");
      render();
    });

    window.addEventListener('cws_project_changed', ()=>{ try{ render(); }catch(e){ console.error(e);} });

    render();
  </script>
</body>
