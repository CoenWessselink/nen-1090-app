<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lascontrole</title>
  <link rel="stylesheet" href="../css/theme.css" />
  <link rel="stylesheet" href="../css/workflow-rebuild.css" />
  <style>
    .page{display:grid;gap:18px}.hero{display:flex;justify-content:space-between;gap:18px;align-items:end;flex-wrap:wrap}.hero h1{margin:0;font-size:42px;line-height:.95;letter-spacing:-.04em}.hero p{margin:8px 0 0;color:#64748b;max-width:860px}
    .hero-actions,.toolbar,.tabs,.actions,.row-actions{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.toolbar .input{min-width:240px}
    .surface,.panel,.stat,.tree-card,.photo-card,.summary-box{background:#fff;border:1px solid #e5ebf5;border-radius:24px;box-shadow:0 12px 34px rgba(15,23,42,.05)}
    .surface,.panel,.summary-box{padding:18px}.summary-grid{display:grid;grid-template-columns:1.25fr .75fr;gap:16px}.summary-box h2,.panel h3{margin:0 0 10px}.summary-box p{margin:0;color:#64748b}
    .stats{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:12px}.stat{padding:16px}.stat strong{display:block;font-size:26px}.stat span{color:#64748b;font-size:13px}
    .tab.active{background:#eef4ff;border-color:#cfe0ff;color:#2457e6}.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}.list{display:grid;gap:10px}.tree-card{padding:14px}.tree-card .head{display:flex;justify-content:space-between;gap:12px;align-items:start}.muted{color:#64748b}.badge{display:inline-flex;align-items:center;border-radius:999px;padding:6px 10px;background:#f1f5f9;color:#334155;font-size:12px;font-weight:800}.badge.ok{background:#dcfce7;color:#166534}.badge.open{background:#dbeafe;color:#1d4ed8}.badge.nok{background:#fee2e2;color:#b91c1c}
    .table-wrap{overflow:auto}table{width:100%;border-collapse:collapse;min-width:1100px}th,td{padding:12px 10px;border-bottom:1px solid #edf2f7;text-align:left;vertical-align:top}th{font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:#64748b}
    .photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px}.photo-card{overflow:hidden}.photo-card img{display:block;width:100%;height:140px;object-fit:cover;background:#f8fafc}.photo-card .body{padding:10px 12px}
    .inspect-grid{display:grid;grid-template-columns:1.15fr .85fr;gap:16px}.inspect-kpi{display:grid;gap:10px}.inspect-kpi .item{border:1px solid #e5ebf5;border-radius:18px;padding:14px;background:#fff}.small{font-size:12px}
    @media (max-width:980px){.summary-grid,.inspect-grid,.grid{grid-template-columns:1fr}.stats{grid-template-columns:repeat(3,minmax(0,1fr))}}
    @media (max-width:760px){.hero h1{font-size:34px}.toolbar{display:grid;grid-template-columns:1fr 1fr}.toolbar .input{grid-column:1/-1;min-width:0;width:100%}.stats{grid-template-columns:1fr 1fr}}
  </style>
</head>
<body data-title="Lascontrole">
  <main class="page">
    <section class="hero">
      <div>
        <h1>Lassen en inspectie</h1>
        <p>Fase 8 workflow op projectniveau: assemblies aanmaken, lassen registreren, inspecties vastleggen, foto’s koppelen en doorsturen naar het CE dossier. De pagina is nu veilig voor oudere localStorage-states.</p>
      </div>
      <div class="hero-actions"><button class="btn" id="btnToProjects">Projecten</button><button class="btn" id="btnToCe">CE dossier</button></div>
    </section>

    <section class="summary-grid">
      <div class="summary-box" id="projectContext"></div>
      <div class="summary-box" id="readinessBox"></div>
    </section>

    <section class="surface">
      <div class="toolbar">
        <select id="projectSelect" class="input"></select>
        <input id="search" class="input" placeholder="Zoeken op assembly, lasnummer, lasser of materiaal" />
        <button class="btn" id="btnAssembly">Nieuwe assembly</button>
        <button class="btn" id="btnWeld">Nieuwe las</button>
        <button class="btn" id="btnPhoto">Foto upload</button>
      </div>
    </section>

    <section class="stats" id="stats"></section>

    <section class="tabs">
      <button class="tab active" data-tab="structuur">Structuur</button>
      <button class="tab" data-tab="lassen">Lassen</button>
      <button class="tab" data-tab="inspectie">Inspectie</button>
      <button class="tab" data-tab="fotos">Foto’s</button>
      <button class="tab" data-tab="rapportage">Rapportage</button>
    </section>

    <section id="view"></section>
  </main>

  <script src="../js/core/routes.js"></script>
  <script src="../js/core/design_system.js"></script>
  <script src="../js/core/store.js"></script>
  <script src="../js/core/permissions.js"></script>
  <script src="../js/core/ui.js"></script>
  <script src="../js/core/apps_menu.js"></script>
  <script src="../js/core/export.js"></script>
  <script src="../js/core/pwa.js"></script>
  <script src="../js/core/icon_pack.js"></script>
  <script src="../js/core/shell.js"></script>
  <script src="../js/core/workflow_shell.js"></script>
  <script>
    try{ Shell.mount(); WorkflowShell.mount(); }catch(_){ }
    const pageState = { tab:'structuur', search:'' };
    function st(){ return window.CWS.getState(); }
    function esc(v){ return UI.esc(v ?? ''); }
    function uid(prefix){ return `${prefix}-${Date.now()}`; }
    function ensureShape(){
      const s = st();
      let dirty = false;
      [['assemblies',{byId:{},byProject:{}}],['welds',{byId:{},byProject:{}}],['documents',{byId:{},byProject:{}}],['controls',{byWeld:{}}]].forEach(([key,val]) => { if(!s[key]){ s[key]=val; dirty = true; } });
      if(!s.settings) { s.settings = { company:{}, workers:{byId:{},order:[]}, lists:{ materials:['S355'], processes:['135'], lasmethodes:['Stompe hoeklas'], excKlassen:['EXC2'], acceptatieKlassen:['5817-B'], ndoMethods:['VT'] } }; dirty = true; }
      if(dirty) window.CWS.setState(s);
      return s;
    }
    function currentProjectId(){ const s = ensureShape(); return s.ui.activeProjectId || s.projects.order?.[0] || null; }
    function currentProject(){ const s = ensureShape(); return s.projects.byId[currentProjectId()] || null; }
    function assemblies(){ const s = ensureShape(); return (s.assemblies.byProject[currentProjectId()] || []).map(id => s.assemblies.byId[id]).filter(Boolean); }
    function welds(){ const s = ensureShape(); return (s.welds.byProject[currentProjectId()] || []).map(id => s.welds.byId[id]).filter(Boolean); }
    function projectDocs(kind, weldId){
      const s = ensureShape();
      return (s.documents.byProject[currentProjectId()] || []).map(id => s.documents.byId[id]).filter(Boolean).filter(d => (!kind || d.kind === kind) && (!weldId || String(d.weldId) === String(weldId)));
    }
    function assemblyName(id){ const s = ensureShape(); const a = s.assemblies.byId[id]; return a ? (a.code || a.name || a.id) : '-'; }
    function filterText(w){ return [w.weldNo || w.id, w.locatie, w.lassers, assemblyName(w.assemblyId), w.materiaal, w.proces, w.wps].join(' ').toLowerCase(); }
    function filteredWelds(){ const q = pageState.search.trim().toLowerCase(); const rows = welds(); return q ? rows.filter(w => filterText(w).includes(q)) : rows; }
    function setProject(id){ const s = ensureShape(); s.ui.activeProjectId = id; window.CWS.setState(s); render(); }
    function statusBadge(status){ const cls = /ok|conform|goedgekeurd/.test(String(status||'').toLowerCase()) ? 'ok' : (/afgekeurd|nok|repair/.test(String(status||'').toLowerCase()) ? 'nok' : 'open'); return `<span class="badge ${cls}">${esc(status || 'open')}</span>`; }
    function refreshProjectSelect(){
      const sel = document.getElementById('projectSelect');
      const s = ensureShape();
      sel.innerHTML = (s.projects.order || []).map(id => {
        const p = s.projects.byId[id];
        return `<option value="${esc(id)}" ${String(id)===String(currentProjectId())?'selected':''}>${esc(p.nummer)} · ${esc(p.naam)}</option>`;
      }).join('');
    }
    function projectSummary(){
      const p = currentProject();
      if(!p) return;
      const photos = projectDocs('photo');
      const rows = filteredWelds();
      const okCount = rows.filter(w => String(w.vtStatus || '').toLowerCase() === 'ok').length;
      document.getElementById('projectContext').innerHTML = `<h2>${esc(p.nummer || '-')} · ${esc(p.naam || '')}</h2><p>${esc(p.opdrachtgever || '-')} · ${esc(p.exc || '-')} · ${esc(p.acceptatieklasse || '-')}</p><div class="actions" style="margin-top:14px">${statusBadge(p.status)}<span class="badge">${assemblies().length} assemblies</span><span class="badge">${rows.length} lassen</span><span class="badge">${photos.length} foto’s</span></div>`;
      const ready = rows.length > 0 && rows.every(w => String(w.vtStatus || '').toLowerCase() === 'ok' && String(w.wps || '').trim() && String(w.lassers || '').trim());
      document.getElementById('readinessBox').innerHTML = `<h2>Dossiergereedheid</h2><p>${ready ? 'Project is klaar voor CE bundeling.' : 'Nog niet alle lassen zijn compleet of goedgekeurd.'}</p><div class="actions" style="margin-top:14px"><span class="badge ${ready ? 'ok' : 'open'}">${ready ? 'ready' : 'in opbouw'}</span><span class="badge">${okCount}/${rows.length} VT akkoord</span></div>`;
    }
    function buildStats(){
      const rows = filteredWelds();
      const photoCount = projectDocs('photo').length;
      const okCount = rows.filter(w => String(w.vtStatus || '').toLowerCase() === 'ok').length;
      const ndtCount = rows.filter(w => String(w.ndoStatus || '').toLowerCase() === 'gereed').length;
      document.getElementById('stats').innerHTML = [
        ['Assemblies', assemblies().length],
        ['Lassen', rows.length],
        ['VT akkoord', okCount],
        ['NDO gereed', ndtCount],
        ['Foto’s', photoCount]
      ].map(([label,val]) => `<div class="stat"><strong>${val}</strong><span>${esc(label)}</span></div>`).join('');
    }
    function assemblyModal(assembly){
      const a = assembly || { code:'', name:'', drawingNo:'', revision:'A', status:'open', notes:'' };
      UI.modalForm({
        title: assembly ? 'Assembly wijzigen' : 'Nieuwe assembly',
        submitLabel: assembly ? 'Opslaan' : 'Toevoegen',
        values: a,
        fields: [
          { key:'code', label:'Code' },
          { key:'name', label:'Naam' },
          { key:'drawingNo', label:'Tekeningnummer' },
          { key:'revision', label:'Revisie' },
          { key:'status', label:'Status', type:'select', options:['open','released','closed'] },
          { key:'notes', label:'Notities', type:'textarea', rows:3 }
        ],
        onSubmit: values => {
          window.CWS.upsertAssembly({ id: assembly?.id || uid('ASM'), projectId: currentProjectId(), ...values });
          render(); UI.toast(assembly ? 'Assembly opgeslagen' : 'Assembly toegevoegd'); return true;
        }
      });
    }
    function weldModal(weld){
      const s = ensureShape();
      const assemblyOptions = assemblies().map(a => ({ value:a.id, label:`${a.code || a.id} · ${a.name || ''}` }));
      const workerOptions = (s.settings.workers.order || []).map(id => s.settings.workers.byId[id]).filter(Boolean).map(w => ({ value:w.naam || w.id, label:w.naam || w.id }));
      const materialOptions = (s.settings.lists.materials || []).map(x => ({ value:x, label:x }));
      const processOptions = (s.settings.lists.processes || []).map(x => ({ value:x, label:x }));
      const methodOptions = (s.settings.lists.lasmethodes || []).map(x => ({ value:x, label:x }));
      const w = weld || { weldNo:'', assemblyId:assemblies()[0]?.id || '', locatie:'', proces:processOptions[0]?.value || '', materiaal:materialOptions[0]?.value || '', dikte:'', lassers:workerOptions[0]?.value || '', wps:methodOptions[0]?.value || '', vtStatus:'open', ndoStatus:'open', status:'open' };
      UI.modalForm({
        title: weld ? 'Las wijzigen' : 'Nieuwe las', submitLabel: weld ? 'Opslaan' : 'Toevoegen', values: w,
        fields: [
          { key:'weldNo', label:'Lasnummer' },
          { key:'assemblyId', label:'Assembly', type:'select', options: assemblyOptions.length ? assemblyOptions : [{value:'',label:'Geen assembly'}] },
          { key:'locatie', label:'Locatie' },
          { key:'proces', label:'Proces', type:'select', options: processOptions },
          { key:'materiaal', label:'Materiaal', type:'select', options: materialOptions },
          { key:'dikte', label:'Dikte (mm)' },
          { key:'lassers', label:'Lasser', type:'select', options: workerOptions.length ? workerOptions : [{value:'',label:'Geen medewerker'}] },
          { key:'wps', label:'WPS / lasmethode', type:'select', options: methodOptions.length ? methodOptions : [{value:'',label:'Geen lasmethode'}] },
          { key:'vtStatus', label:'VT status', type:'select', options:['open','ok','nok'] },
          { key:'ndoStatus', label:'NDO status', type:'select', options:['open','nvt','gepland','gereed'] },
          { key:'status', label:'Workflowstatus', type:'select', options:['open','in_controle','conform','afgekeurd'] }
        ],
        onSubmit: values => {
          const id = weld?.id || uid('W');
          const current = ensureShape().welds.byId[id] || {};
          window.CWS.upsertWeld({ ...current, id, projectId:currentProjectId(), photos: Number(current.photos)||0, last:new Date().toISOString(), ...values });
          render(); UI.toast(weld ? 'Las opgeslagen' : 'Las toegevoegd'); return true;
        }
      });
    }
    function inspectionModal(weld){
      const controls = window.CWS.ensureControlsForWeld(weld.id);
      const flat = ['pre','mat','weld','ndt','doc'].flatMap(group => (controls[group] || []).map(row => ({ group, ...row })));
      const body = `<div class="list">${flat.map((row,idx) => `
        <div class="tree-card">
          <div class="head"><div><strong>${esc(row.criterium)}</strong><div class="muted small" style="margin-top:4px">${esc(row.norm || '')}</div></div><span class="badge ${row.goedgekeurd?'ok':'open'}">${esc(row.group)}</span></div>
          <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:10px">
            <label><input type="checkbox" data-i="${idx}" data-f="vanToepassing" ${row.vanToepassing ? 'checked' : ''}> van toepassing</label>
            <label><input type="checkbox" data-i="${idx}" data-f="goedgekeurd" ${row.goedgekeurd ? 'checked' : ''}> goedgekeurd</label>
          </div>
          <textarea class="input" rows="2" data-i="${idx}" data-f="opmerking" style="margin-top:10px">${esc(row.opmerking || '')}</textarea>
        </div>`).join('')}</div>`;
      UI.openModal({
        title: `Inspectie ${weld.weldNo || weld.id}`,
        saveLabel: 'Opslaan',
        bodyHtml: body,
        onSave: ({close}) => {
          document.querySelectorAll('#uiModalBody [data-i]').forEach(el => {
            const idx = Number(el.dataset.i); const row = flat[idx]; if(!row) return;
            const patch = {}; if(el.dataset.f === 'opmerking') patch.opmerking = el.value; else patch[el.dataset.f] = !!el.checked;
            window.CWS.setCriterion(weld.id, row.group, row.id, patch);
          });
          const groups = window.CWS.ensureControlsForWeld(weld.id);
          const allRows = ['pre','mat','weld','ndt','doc'].flatMap(g => groups[g] || []).filter(x => x.vanToepassing !== false);
          const ok = allRows.length && allRows.every(x => x.goedgekeurd);
          window.CWS.upsertWeld({ ...weld, vtStatus: ok ? 'ok' : 'open', status: ok ? 'conform' : 'in_controle', last:new Date().toISOString() });
          close(); render(); UI.toast('Inspectie opgeslagen');
        }
      });
    }
    function uploadPhotos(prefillWeldId){
      const list = filteredWelds();
      if(!list.length){ UI.toast('Voeg eerst een las toe'); return; }
      const options = list.map(w => ({ value:w.id, label:`${w.weldNo || w.id} · ${w.locatie || '-'}` }));
      const defaultWeld = prefillWeldId || options[0]?.value || '';
      UI.openModal({
        title:'Foto upload', saveLabel:'Opslaan',
        bodyHtml:`<div style="display:grid;gap:12px"><label><div class="smallmuted" style="font-weight:800;margin-bottom:6px">Las</div><select id="photoWeld" class="input">${options.map(o => `<option value="${esc(o.value)}" ${String(o.value)===String(defaultWeld)?'selected':''}>${esc(o.label)}</option>`).join('')}</select></label><label><div class="smallmuted" style="font-weight:800;margin-bottom:6px">Camera / foto</div><input id="photoInput" class="input" type="file" accept="image/*" capture="environment" multiple></label><div class="smallmuted">Mobiele camera wordt ondersteund via capture=environment.</div></div>`,
        onSave: ({close}) => {
          const weldId = document.getElementById('photoWeld').value || defaultWeld;
          const files = Array.from(document.getElementById('photoInput').files || []);
          if(!files.length){ UI.toast('Kies minimaal één foto'); return false; }
          let remaining = files.length;
          files.forEach(file => {
            const reader = new FileReader();
            reader.onload = () => {
              window.CWS.upsertDocument({ id: uid('DOC'), projectId:currentProjectId(), weldId, name:file.name, mime:file.type || 'image/jpeg', size:file.size || 0, kind:'photo', dataUrl:String(reader.result || ''), ts:new Date().toISOString() });
              const weld = ensureShape().welds.byId[weldId];
              if(weld) window.CWS.upsertWeld({ ...weld, photos: (Number(weld.photos)||0) + 1, last:new Date().toISOString() });
              remaining -= 1; if(remaining === 0){ close(); render(); UI.toast('Foto(s) opgeslagen'); }
            };
            reader.readAsDataURL(file);
          });
        }
      });
    }
    function deleteAssembly(id){ if(confirm('Assembly verwijderen?')){ window.CWS.removeAssembly(id); render(); } }
    function deleteWeld(id){ if(confirm('Las verwijderen?')){ window.CWS.removeWeld(id); render(); } }
    function renderStructuur(){
      const asm = assemblies().map(a => ({...a, welds: filteredWelds().filter(w => String(w.assemblyId)===String(a.id))}));
      return `<div class="grid"><div class="panel"><h3>Assemblies</h3><div class="list">${asm.map(a => `
        <article class="tree-card" data-assembly-id="${esc(a.id)}">
          <div class="head"><div><strong>${esc(a.code || a.id)}</strong><div class="muted small" style="margin-top:4px">${esc(a.name || '-')} · Tekening ${esc(a.drawingNo || '-')} · Rev. ${esc(a.revision || '-')}</div></div>${statusBadge(a.status)}</div>
          <div class="row-actions" style="margin-top:12px"><button class="btn" data-action="edit-assembly" data-id="${esc(a.id)}">Wijzig</button><button class="btn" data-action="delete-assembly" data-id="${esc(a.id)}">Verwijder</button><button class="btn" data-action="new-weld" data-id="${esc(a.id)}">Las toevoegen</button></div>
        </article>`).join('') || '<div class="muted">Nog geen assemblies.</div>'}</div></div>
        <div class="panel"><h3>Projectstructuur</h3><div class="list">${asm.map(a => `
          <article class="tree-card"><div class="head"><strong>${esc(a.code || a.id)} · ${esc(a.name || '')}</strong><span class="badge">${a.welds.length} lassen</span></div><div class="muted" style="margin-top:8px">${a.welds.map(w => `${esc(w.weldNo || w.id)} · ${esc(w.locatie || '-')}`).join('<br>') || 'Nog geen lassen in deze assembly.'}</div></article>`).join('') || '<div class="muted">Selecteer of maak eerst een assembly aan.</div>'}</div></div></div>`;
    }
    function renderLassen(){
      const rows = filteredWelds();
      return `<div class="surface"><div class="table-wrap"><table><thead><tr><th>Las</th><th>Assembly</th><th>Proces</th><th>Materiaal</th><th>Lasser</th><th>WPS</th><th>VT</th><th>NDO</th><th>Foto’s</th><th>Acties</th></tr></thead><tbody>${rows.map(w => `
        <tr data-id="${esc(w.id)}"><td><strong>${esc(w.weldNo || w.id)}</strong><div class="smallmuted">${esc(w.locatie || '-')}</div></td><td>${esc(assemblyName(w.assemblyId))}</td><td>${esc(w.proces || '-')}</td><td>${esc(w.materiaal || '-')}</td><td>${esc(w.lassers || '-')}</td><td>${esc(w.wps || '-')}</td><td>${statusBadge(w.vtStatus)}</td><td>${statusBadge(w.ndoStatus)}</td><td>${esc(w.photos || 0)}</td><td><button class="btn" data-action="edit-weld" data-id="${esc(w.id)}">Wijzig</button><button class="btn" data-action="inspect" data-id="${esc(w.id)}">Inspectie</button><button class="btn" data-action="upload-photo-for" data-id="${esc(w.id)}">Foto</button><button class="btn" data-action="delete-weld" data-id="${esc(w.id)}">Verwijder</button></td></tr>`).join('') || '<tr><td colspan="10" class="smallmuted">Nog geen lassen.</td></tr>'}</tbody></table></div></div>`;
    }
    function renderInspectie(){
      const rows = filteredWelds();
      const okCount = rows.filter(w => String(w.vtStatus || '').toLowerCase() === 'ok').length;
      const missingPhotos = rows.filter(w => !Number(w.photos || 0)).length;
      return `<div class="inspect-grid"><div class="panel"><h3>Openstaande inspecties</h3><div class="list">${rows.map(w => `
        <article class="tree-card"><div class="head"><div><strong>${esc(w.weldNo || w.id)}</strong><div class="muted small" style="margin-top:4px">${esc(w.locatie || '-')} · ${esc(assemblyName(w.assemblyId))}</div></div>${statusBadge(w.vtStatus)}</div><div class="row-actions" style="margin-top:12px"><button class="btn" data-action="inspect" data-id="${esc(w.id)}">Inspectie openen</button><button class="btn" data-action="upload-photo-for" data-id="${esc(w.id)}">Foto koppelen</button></div></article>`).join('') || '<div class="muted">Nog geen lassen.</div>'}</div></div>
      <div class="inspect-kpi"><div class="item"><strong style="font-size:26px">${okCount}/${rows.length || 0}</strong><div class="muted">VT akkoord</div></div><div class="item"><strong style="font-size:26px">${missingPhotos}</strong><div class="muted">Lassen zonder foto</div></div><div class="item"><strong>Inspectiestructuur</strong><div class="muted" style="margin-top:6px">Voorbereiding, materiaal, las, NDT en documentatie. Na volledig goedkeuren wordt VT automatisch op OK gezet.</div></div></div></div>`;
    }
    function renderFotos(){
      const photos = projectDocs('photo');
      return `<div class="surface"><div class="photo-grid">${photos.map(doc => `<article class="photo-card"><img src="${esc(doc.dataUrl || '')}" alt="${esc(doc.name)}"><div class="body"><strong>${esc(doc.name)}</strong><div class="muted">Las: ${esc(ensureShape().welds.byId[doc.weldId]?.weldNo || doc.weldId || '-')}</div></div></article>`).join('') || '<div class="muted">Nog geen foto’s opgeslagen.</div>'}</div></div>`;
    }
    function buildReportText(){
      const p = currentProject();
      const rows = filteredWelds();
      return [`Lasinspectierapport`, `Project: ${p?.nummer || '-'} - ${p?.naam || '-'}`, `Opdrachtgever: ${p?.opdrachtgever || '-'}`, '', ...rows.map(w => `${w.weldNo || w.id} | ${w.locatie || '-'} | ${assemblyName(w.assemblyId)} | VT=${w.vtStatus || '-'} | NDO=${w.ndoStatus || '-'} | Lasser=${w.lassers || '-'} | Foto's=${w.photos || 0}`)].join('\n');
    }
    function renderRapportage(){
      const rows = filteredWelds();
      const csvRows = rows.map(w => ({ weld:w.weldNo || w.id, location:w.locatie || '', assembly:assemblyName(w.assemblyId), process:w.proces || '', material:w.materiaal || '', welder:w.lassers || '', wps:w.wps || '', vt:w.vtStatus || '', ndo:w.ndoStatus || '', photos:w.photos || 0 }));
      window.__CWS_REPORT_ROWS = csvRows;
      return `<div class="grid"><div class="panel"><h3>Lasinspectierapport</h3><pre style="white-space:pre-wrap;font:inherit;color:#334155;background:#f8fbff;border:1px solid #e5ebf5;border-radius:18px;padding:14px">${esc(buildReportText())}</pre></div><div class="panel"><h3>Export</h3><div class="muted">Gebruik deze rapportage als fase 9 basis voor inspectie-export en CE bundeling.</div><div class="row-actions" style="margin-top:14px"><button class="btn" id="btnExportReportTxt">TXT export</button><button class="btn" id="btnExportReportCsv">CSV export</button><button class="btn" id="btnExportReportJson">JSON export</button></div></div></div>`;
    }
    function renderView(){
      const root = document.getElementById('view');
      if(!currentProject()){ root.innerHTML = '<section class="surface"><div class="muted">Geen actief project geselecteerd.</div></section>'; return; }
      if(pageState.tab === 'structuur') root.innerHTML = renderStructuur();
      else if(pageState.tab === 'lassen') root.innerHTML = renderLassen();
      else if(pageState.tab === 'inspectie') root.innerHTML = renderInspectie();
      else if(pageState.tab === 'fotos') root.innerHTML = renderFotos();
      else root.innerHTML = renderRapportage();
      UI.bindRowDblClick(root.querySelector('tbody'), id => weldModal(ensureShape().welds.byId[id]));
    }
    function render(){ refreshProjectSelect(); projectSummary(); buildStats(); renderView(); }
    document.getElementById('projectSelect').addEventListener('change', e => setProject(e.target.value));
    document.getElementById('search').addEventListener('input', e => { pageState.search = e.target.value || ''; render(); });
    document.getElementById('btnAssembly').addEventListener('click', () => assemblyModal(null));
    document.getElementById('btnWeld').addEventListener('click', () => weldModal(null));
    document.getElementById('btnPhoto').addEventListener('click', () => uploadPhotos());
    document.getElementById('btnToProjects').addEventListener('click', () => location.href = window.CWS_ROUTES.projects);
    document.getElementById('btnToCe').addEventListener('click', () => location.href = window.CWS_ROUTES.billing);
    document.querySelectorAll('[data-tab]').forEach(btn => btn.addEventListener('click', () => { pageState.tab = btn.dataset.tab; document.querySelectorAll('[data-tab]').forEach(x => x.classList.toggle('active', x === btn)); renderView(); }));
    document.getElementById('view').addEventListener('click', e => {
      const btn = e.target.closest('[data-action]'); if(!btn) return;
      const id = btn.dataset.id; const action = btn.dataset.action;
      if(action === 'edit-assembly') assemblyModal(ensureShape().assemblies.byId[id]);
      else if(action === 'delete-assembly') deleteAssembly(id);
      else if(action === 'new-weld') weldModal({ assemblyId:id });
      else if(action === 'edit-weld') weldModal(ensureShape().welds.byId[id]);
      else if(action === 'delete-weld') deleteWeld(id);
      else if(action === 'inspect') inspectionModal(ensureShape().welds.byId[id]);
      else if(action === 'upload-photo-for') uploadPhotos(id);
    });
    document.getElementById('view').addEventListener('click', e => {
      if(e.target.id === 'btnExportReportTxt') Export.text('lasinspectierapport.txt', buildReportText());
      if(e.target.id === 'btnExportReportCsv') Export.toCsv('lasinspectierapport.csv', window.__CWS_REPORT_ROWS || []);
      if(e.target.id === 'btnExportReportJson') Export.json('lasinspectierapport.json', { project: currentProject(), welds: filteredWelds(), photos: projectDocs('photo') });
    });
    if(!(ensureShape().projects.order || []).length) window.CWS.resetDemo();
    if(!currentProjectId()){ const s = ensureShape(); s.ui.activeProjectId = s.projects.order?.[0] || null; window.CWS.setState(s); }
    render();
  </script>
</body>
</html>
