<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lascontrole · CWS NEN-1090</title>
  <link rel="stylesheet" href="../css/app-v2.css">
  <script defer src="../js/core/app_v2.js"></script>
</head>
<body>
  <div id="page-content">
    <section class="page-head">
      <div>
        <div class="overline">Operationele werkplek voor uitvoering, inspectie, blokkades en vervolgstap</div>
        <h1>Lascontrole</h1>
        <p id="weldProjectLabel">Project</p>
      </div>
      <div class="inline-actions">
        <button class="btn" data-action="simulate-inspection">Inspectie afronden</button><button class="btn" data-action="add-weld">Nieuwe las</button>
        <a class="btn btn-primary" href="ce_dossier.html">Naar CE-dossier</a>
      </div>
    </section>

    <section class="metric-grid" id="weldStats"></section>

    <section class="table-card">
      <div class="subtabs">
        <button class="subtab is-active" data-weld-filter="all">Alle lassen</button>
        <button class="subtab" data-weld-filter="Conform">Conform</button>
        <button class="subtab" data-weld-filter="In controle">In controle</button>
        <button class="subtab" data-weld-filter="Repair required">Repair</button>
        <button class="subtab" data-weld-filter="Concept">Concept</button>
      </div>
      <table class="table" style="margin-top:16px">
        <thead><tr><th>Las</th><th>EXC</th><th>NDT</th><th>Status</th><th>Acties</th></tr></thead>
        <tbody id="weldRows"></tbody>
      </table>
      <div class="mobile-list" id="weldMobile"></div>
    </section>

    <section class="card-grid">
      <article class="detail-card">
        <div class="section-title"><div><h2>Vervolgacties</h2><p>Werk vanuit lassen logisch door naar CE</p></div></div>
        <div id="weldNextActions"></div>
      </article>
    </section>
  </div>
</body>
</html>
