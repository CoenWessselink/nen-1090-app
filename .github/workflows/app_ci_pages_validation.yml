name: App CI + Pages Validation

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig*.json'
      - 'vite.config.*'
      - 'scripts/**'
      - '.github/workflows/app_ci_pages_validation.yml'
      - '.github/workflows/deploy_app_to_cloudflare_pages.yml'
  workflow_dispatch:

concurrency:
  group: app-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build Pages release
        env:
          VITE_MARKETING_BASE_URL: https://nen1090-marketing.pages.dev
        run: npm run build:pages

      - name: Verify release output
        run: |
          test -f release/index.html
          test -f release/_redirects
          test -d release/assets

      - name: Upload Pages artifact preview
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-pages-release-preview
          path: release
          if-no-files-found: error
