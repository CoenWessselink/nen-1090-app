name: Playwright Phase 11 Ultra Live

on:
  workflow_run:
    workflows: ["Deploy App to Cloudflare Pages"]
    types: [completed]
  workflow_dispatch:

jobs:
  ultra_live:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Run ultra live suite
        env:
          TEST_TENANT: demo
          TEST_EMAIL: admin@demo.com
          TEST_PASSWORD: Admin123!
        run: npx playwright test tests/e2e/phase-11-ultra --project=desktop-chromium --reporter=line

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase11-ultra-artifacts
          path: |
            playwright-report
            test-results
          if-no-files-found: warn
