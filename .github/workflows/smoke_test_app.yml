name: Smoke Test App

on:
  workflow_run:
    workflows: ["Deploy App to Cloudflare Pages"]
    types: [completed]
  workflow_dispatch:

jobs:
  smoke:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Check app root
        run: curl -fL "https://nen-1090-app.pages.dev/" || exit 1

      - name: Check app shell marker
        run: |
          curl -fsSL "https://nen-1090-app.pages.dev/" | grep -q "<div id=\"root\"></div>"

      - name: Check login route
        run: curl -fL "https://nen-1090-app.pages.dev/login" || exit 1

      - name: Ensure protected route redirects to login
        run: |
          FINAL_URL=$(curl -Ls -o /dev/null -w "%{url_effective}" "https://nen-1090-app.pages.dev/dashboard")
          echo "Final URL: $FINAL_URL"
          echo "$FINAL_URL" | grep -q "/login"
