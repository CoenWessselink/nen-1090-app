name: Smoke Test App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Check app root (SPA load)
        run: |
          set -e
          echo "Checking app root..."
          for i in 1 2 3 4 5; do
            RESPONSE=$(curl -fsSL --max-time 25 https://nen-1090-app.pages.dev/ || true)
            if echo "$RESPONSE" | grep '<div id="root">'; then
              echo "App root OK"
              exit 0
            fi
            echo "App root not ready yet, retry $i/5"
            sleep 6
          done
          echo "App root failed"
          exit 1

      - name: Check marketing root
        run: |
          set -e
          echo "Checking marketing root..."
          for i in 1 2 3 4 5; do
            RESPONSE=$(curl -fsSL --max-time 25 https://nen1090-marketing.pages.dev/ || true)
            if echo "$RESPONSE" | grep -Ei 'WeldInspect|CWS NEN-1090|<html'; then
              echo "Marketing root OK"
              exit 0
            fi
            echo "Marketing root not ready yet, retry $i/5"
            sleep 6
          done
          echo "Marketing root failed"
          exit 1

      - name: Check API health direct with retries
        id: api_direct
        continue-on-error: true
        run: |
          set +e
          echo "Checking direct API health with retries..."
          URLS=(
            "https://nen1090-api-prod-f5ddagedbrftb4ew.westeurope-01.azurewebsites.net/api/v1/health"
            "https://nen1090-api-prod-f5ddagedbrftb4ew.westeurope-01.azurewebsites.net/health"
            "https://nen1090-api-prod-f5ddagedbrftb4ew.westeurope-01.azurewebsites.net/api/health"
          )
          ok=0
          for url in "${URLS[@]}"; do
            echo "Direct URL: $url"
            for i in 1 2 3 4 5 6; do
              tmp_body=$(mktemp)
              code=$(curl -sS -L --max-time 30 -o "$tmp_body" -w "%{http_code}" "$url" || echo "000")
              echo "Direct attempt $i code=$code"
              head -c 500 "$tmp_body" || true
              echo ""
              if [ "$code" = "200" ] || [ "$code" = "204" ]; then
                ok=1
                rm -f "$tmp_body"
                break 2
              fi
              rm -f "$tmp_body"
              sleep 8
            done
          done
          if [ "$ok" -eq 1 ]; then
            echo "direct_ok=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "direct_ok=false" >> "$GITHUB_OUTPUT"
          exit 1

      - name: Check API health through Cloudflare proxies
        id: api_proxy
        continue-on-error: true
        run: |
          set +e
          echo "Checking proxy API health with retries..."
          URLS=(
            "https://app.weldinspectpro.com/api/v1/health"
            "https://app.weldinspectpro.com/api/health"
            "https://nen-1090-app.pages.dev/api/v1/health"
            "https://nen-1090-app.pages.dev/api/health"
            "https://weldinspectpro.com/api/v1/health"
            "https://weldinspectpro.com/api/health"
            "https://nen1090-marketing.pages.dev/api/v1/health"
            "https://nen1090-marketing.pages.dev/api/health"
          )
          ok=0
          for url in "${URLS[@]}"; do
            echo "Proxy URL: $url"
            for i in 1 2 3 4 5 6; do
              tmp_body=$(mktemp)
              code=$(curl -sS -L --max-time 30 -o "$tmp_body" -w "%{http_code}" "$url" || echo "000")
              echo "Proxy attempt $i code=$code"
              head -c 500 "$tmp_body" || true
              echo ""
              if [ "$code" = "200" ] || [ "$code" = "204" ]; then
                ok=1
                rm -f "$tmp_body"
                break 2
              fi
              rm -f "$tmp_body"
              sleep 8
            done
          done
          if [ "$ok" -eq 1 ]; then
            echo "proxy_ok=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "proxy_ok=false" >> "$GITHUB_OUTPUT"
          exit 1

      - name: Validate API health result
        run: |
          direct_ok="${{ steps.api_direct.outputs.direct_ok }}"
          proxy_ok="${{ steps.api_proxy.outputs.proxy_ok }}"
          echo "direct_ok=$direct_ok"
          echo "proxy_ok=$proxy_ok"
          if [ "$direct_ok" = "true" ] || [ "$proxy_ok" = "true" ]; then
            echo "At least one API health path returned HTTP 2xx."
            exit 0
          fi
          echo "Both direct API health and Cloudflare proxy health failed after retries."
          exit 1

      - name: Smoke test completed
        run: echo "Smoke test passed"
