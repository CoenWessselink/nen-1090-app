name: Smoke Test App

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Check app root
        run: curl -fL "https://nen-1090-app.pages.dev/" >/dev/null

      - name: Check dashboard route resolves
        run: curl -fL "https://nen-1090-app.pages.dev/dashboard" >/dev/null

      - name: Check projecten route resolves
        run: curl -fL "https://nen-1090-app.pages.dev/projecten" >/dev/null
