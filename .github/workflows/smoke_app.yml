name: Smoke Test App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Check app root (SPA load)
        run: |
          echo "Checking app root..."
          RESPONSE=$(curl -s https://nen-1090-app.pages.dev/)
          echo "$RESPONSE" | grep '<div id="root">' || exit 1

      - name: Check API health through marketing proxy
        run: |
          echo "Checking API health through marketing..."
          curl -fL https://nen1090-marketing.pages.dev/api/health || exit 1

      - name: Smoke test completed
        run: echo "Smoke test passed"
