name: Smoke Test App

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Check app root
        run: curl -fL "https://nen-1090-app.pages.dev/" || exit 1

      - name: Check app shell html
        run: |
          RESPONSE=$(curl -s https://nen-1090-app.pages.dev/)
          echo "$RESPONSE" | grep 'id="root"' || exit 1
