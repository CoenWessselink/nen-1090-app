name: Smoke Test App

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Check app root
        run: curl -fL "https://nen-1090-app.pages.dev/" || exit 1

      - name: Check app shell marker
        run: |
          RESPONSE=$(curl -sL "https://nen-1090-app.pages.dev/")
          echo "$RESPONSE" | grep '<div id="root"></div>' || exit 1

      - name: Check marketing login route
        run: curl -fL "https://nen1090-marketing-new.pages.dev/app/login" || exit 1

      - name: Check auth me through marketing origin
        run: curl -fL "https://nen1090-marketing-new.pages.dev/api/v1/auth/me" || true
