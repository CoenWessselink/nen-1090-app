name: Playwright Smoke

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Build frontend
        run: npm run build

      - name: Run smoke tests
        run: npx playwright test tests/e2e/auth-onboarding-flow.spec.ts tests/e2e/platform-shell.spec.ts tests/e2e/lascontrole-shell.spec.ts tests/e2e/superadmin-billing-shell.spec.ts tests/e2e/phase5-hardening-smoke.spec.ts --project=desktop-chromium

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-smoke-report
          path: |
            playwright-report
            test-results
