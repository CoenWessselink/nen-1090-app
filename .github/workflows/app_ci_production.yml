
name: App CI + Pages Validation

on:
  push:
    branches: [ main ]
    paths:
      - 'layers/**'
      - 'css/**'
      - 'js/**'
      - 'playwright/**'
      - '.github/workflows/app_ci_production.yml'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install deps
        run: npm ci
      - name: Syntax check JS
        run: node --check js/core/auth_client.js && node --check js/core/permissions.js && node --check js/superadmin.js && node --check js/tenant_billing.js
      - name: Playwright install
        run: npx playwright install --with-deps chromium
      - name: Run smoke tests
        run: npx playwright test playwright/tests/smoke.spec.js --reporter=line
