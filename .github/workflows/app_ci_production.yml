name: App CI + Pages Validation

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build Pages release
        env:
          VITE_MARKETING_BASE_URL: https://nen1090-marketing.pages.dev
        run: npm run build:pages

      - name: Verify release output
        run: |
          test -f release/index.html
          test -f release/_redirects
          test -f release/_headers
          test -d release/assets
