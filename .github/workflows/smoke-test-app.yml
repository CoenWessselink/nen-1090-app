name: Smoke Test App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check app root
        run: |
          curl -fsSL "https://nen-1090-app.pages.dev/" > root.html
          test -s root.html

      - name: Check app shell marker
        run: |
          curl -fsSL "https://nen-1090-app.pages.dev/" > shell.html
          grep -Eiq '<div[^>]+id="app"|data-app-ready|<title>' shell.html

      - name: Check login route
        run: |
          curl -fsSL "https://nen-1090-app.pages.dev/login" > login.html
          grep -Eiq 'login|wachtwoord|email|inloggen' login.html

      - name: Setup Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install --with-deps chromium

      - name: Ensure protected route redirects to login
        run: |
          node <<'EOF'
          const { chromium } = require('playwright');

          (async () => {
            const browser = await chromium.launch({ headless: true });
            const page = await browser.newPage();
            await page.goto('https://nen-1090-app.pages.dev/dashboard', { waitUntil: 'networkidle' });
            const finalUrl = page.url();
            console.log('Final URL:', finalUrl);

            if (!/\/login(?:$|[?#])/.test(finalUrl)) {
              throw new Error(`Expected client-side redirect to /login, got ${finalUrl}`);
            }

            const bodyText = await page.locator('body').innerText();
            if (!/login|inloggen|email|wachtwoord/i.test(bodyText)) {
              throw new Error('Login page markers not found after redirect');
            }

            await browser.close();
          })().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          EOF
