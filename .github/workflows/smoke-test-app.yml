name: Smoke Test App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check app root
        run: |
          curl -fsSL "https://nen-1090-app.pages.dev/" > root.html
          test -s root.html

      - name: Check app shell marker
        run: |
          curl -fsSL "https://nen-1090-app.pages.dev/" > shell.html
          grep -Eiq '<div[^>]+id="app"|data-app-ready|<title>' shell.html

      - name: Install Playwright package
        run: |
          npm init -y
          npm install playwright

      - name: Install system Chromium
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser || sudo apt-get install -y chromium

      - name: Smoke test auth redirect in browser
        run: |
          export CHROME_BIN=/usr/bin/chromium-browser
          if [ ! -x "$CHROME_BIN" ]; then export CHROME_BIN=/usr/bin/chromium; fi

          node <<'EOF'
          const { chromium } = require('playwright');

          (async () => {
            const browser = await chromium.launch({
              headless: true,
              executablePath: process.env.CHROME_BIN
            });

            const page = await browser.newPage();
            await page.goto('https://nen-1090-app.pages.dev/dashboard', {
              waitUntil: 'networkidle'
            });

            const finalUrl = page.url();
            console.log('FINAL URL:', finalUrl);

            if (!/\/login(?:$|[?#])/.test(finalUrl)) {
              throw new Error(`Expected redirect to /login, got ${finalUrl}`);
            }

            const bodyText = await page.locator('body').innerText();
            if (!/login|inloggen|email|wachtwoord/i.test(bodyText)) {
              throw new Error('Login markers not found after redirect');
            }

            console.log('Smoke auth redirect OK');
            await browser.close();
          })().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          EOF
