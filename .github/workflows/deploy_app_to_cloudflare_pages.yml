name: Deploy App to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig*.json'
      - 'vite.config.*'
      - 'scripts/**'
      - '.github/workflows/deploy_app_to_cloudflare_pages.yml'
  workflow_dispatch:

concurrency:
  group: cloudflare-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build release for Pages
        env:
          VITE_MARKETING_BASE_URL: https://nen1090-marketing.pages.dev
        run: npm run build:pages

      - name: Verify built Pages artifact
        run: |
          test -f release/index.html
          test -f release/_redirects
          test -d release/assets
          test -n "$(find release/assets -maxdepth 1 -type f \( -name '*.js' -o -name '*.css' \) | head -n 1)"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          projectName: nen-1090-app
          directory: release
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Live smoke test root
        run: |
          curl -fsSL "https://nen-1090-app.pages.dev/" > root.html
          grep -q '<div id="root"></div>' root.html

      - name: Live smoke test login
        run: |
          curl -fsSL "https://nen-1090-app.pages.dev/login" > login.html
          grep -q '<div id="root"></div>' login.html

      - name: Live smoke test asset MIME
        run: |
          ASSET_PATH=$(grep -o '/assets/[^"'"' ]*\.js' release/index.html | head -n 1)
          echo "Testing asset: $ASSET_PATH"
          test -n "$ASSET_PATH"
          curl -fsSI "https://nen-1090-app.pages.dev${ASSET_PATH}" > asset_headers.txt
          grep -Ei '^content-type:.*(javascript|ecmascript|text/javascript|application/javascript)' asset_headers.txt
