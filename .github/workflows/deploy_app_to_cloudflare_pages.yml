name: Deploy App to Cloudflare Pages

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "public/**"
      - "functions/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig*.json"
      - "vite.config.*"
      - "index.html"
      - "index.source.html"
      - "_headers"
      - "scripts/submodules-init.mjs"
      - ".github/workflows/deploy_app_to_cloudflare_pages.yml"

concurrency:
  group: cloudflare-pages-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write

# Secrets (repo Settings > Secrets > Actions):
#   CF_API_TOKEN — API Token met o.a. Account:Read + Cloudflare Pages:Edit
#   CF_ACCOUNT_ID — Cloudflare dashboard (account-id)

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build release for Pages
        env:
          VITE_MARKETING_BASE_URL: https://nen1090-marketing.pages.dev
          VITE_COMMIT_SHA: ${{ github.sha }}
          VITE_DEPLOYMENT_ENV: production
        run: npm run build:pages

      - name: Verify built Pages artifact
        run: |
          test -f release/index.html
          test -d release/assets

      # Faalt snel met duidelijke fout als repo secrets ontbreken of token geen Pages-rechten heeft.
      - name: Preflight Cloudflare (auth + Pages API)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          set -e
          if [ -z "${CLOUDFLARE_API_TOKEN}" ] || [ -z "${CLOUDFLARE_ACCOUNT_ID}" ]; then
            echo "::error::CF_API_TOKEN of CF_ACCOUNT_ID ontbreekt in GitHub repo Settings > Secrets and variables > Actions"
            exit 1
          fi
          npx --yes wrangler@3.90.0 whoami
          npx --yes wrangler@3.90.0 pages project list | head -50

      # 🔥 NIEUWE STABIELE DEPLOY
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy release --project-name=nen-1090-app
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}