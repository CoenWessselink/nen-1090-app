name: Superadmin Billing Smoke

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - "src/features/superadmin/**"
      - "src/features/billing/**"
      - "src/api/platform.ts"
      - "src/api/billing.ts"
      - "src/hooks/useTenantAdmin.ts"
      - "src/hooks/useBilling.ts"
      - "tests/e2e/superadmin-billing-lifecycle.spec.ts"
      - "playwright.config.ts"
      - ".github/workflows/superadmin-billing-smoke.yml"

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build

      - name: Run superadmin billing smoke
        env:
          PLAYWRIGHT_HOST: 127.0.0.1
          PLAYWRIGHT_PORT: 4173
        run: npx playwright test tests/e2e/superadmin-billing-lifecycle.spec.ts --project=desktop-chromium

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: superadmin-billing-smoke-report
          path: |
            playwright-report
            test-results
